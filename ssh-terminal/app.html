<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:-apple-system,sans-serif;color:#eaeaea}

#content{flex:1;min-height:0;position:relative;overflow:hidden}

/* Terminal */

.tbar{flex-shrink:0;display:flex;gap:4px;padding:5px 8px;background:#111;border-top:1px solid rgba(255,255,255,0.07);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbtn{padding:5px 9px;border-radius:50px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.65);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tbtn:active{background:rgba(79,195,247,0.2);border-color:#4FC3F7;color:#4FC3F7}

/* Profiles */
.plist{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}

select.fi option{background:#1a1a2e}

</style>

<div id="shell">
  <div class="hdr">
    <div class="hdr-icon">⌨️</div>
    <div><div class="hdr-title">SSH Client</div><div class="hdr-sub" id="hdr-sub">No connection</div></div>

  </div>

    <div class="tab"    id="tab-sftp"     onclick="switchTab('sftp')">SFTP</div>

    <!-- Profiles -->
    <div class="view on" id="view-profiles">
      <div class="plist" id="plist"></div>
      <button class="fab" onclick="openAddProfile()">＋</button>
    </div>
    <!-- Terminal -->
    <div class="view" id="view-terminal">
      <div id="no-conn">
        <div class="ico">🔐</div>
        <p>No active SSH connection.<br>Connect from the Profiles tab.</p>
      </div>
      <div id="term-wrap">
        <div id="term-container"></div>
        <div class="tbar">
          <button class="tbtn hi" onclick="ts('\t')">TAB</button>
          <button class="tbtn hi" onclick="ts('\x03')">^C</button>
          <button class="tbtn hi" onclick="ts('\x04')">^D</button>
          <button class="tbtn hi" onclick="ts('\x1b')">ESC</button>
          <button class="tbtn" onclick="ts('\x1b[A')">▲</button>
          <button class="tbtn" onclick="ts('\x1b[B')">▼</button>
          <button class="tbtn" onclick="ts('\x1b[D')">◄</button>
          <button class="tbtn" onclick="ts('\x1b[C')">►</button>
          <button class="tbtn" onclick="ts('\x1b[5~')">PgUp</button>
          <button class="tbtn" onclick="ts('\x1b[6~')">PgDn</button>
          <button class="tbtn" id="ctrl-latch-btn" onclick="toggleCtrlLatch()">CTRL</button>
          <button class="tbtn" onclick="zoomOut()">A−</button>
          <button class="tbtn" onclick="zoomIn()">A+</button>
          <button class="tbtn" onclick="showQuickCmd()">Quick</button>
          <button class="tbtn" onclick="doDisconnect()">Disconnect</button>
        </div>
        <!-- CTRL input bar — shown when CTRL is latched -->
        <div id="ctrl-bar">
          <span id="ctrl-bar-label">CTRL+</span>
          <input id="ctrl-input" type="text" maxlength="1"
            autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
            placeholder="type a key…">

        </div>

    <!-- SFTP -->
    <div class="view" id="view-sftp">

        <button class="bico be" style="font-size:12px" onclick="sftpUp()">⬆</button>
        <div class="spath" id="sftp-path">/</div>
        <button class="bico be" style="font-size:14px" onclick="sftpList()">↻</button>
        <button class="bico bc" style="font-size:12px" onclick="sftpMkdir()">📁+</button>
      </div>

      <div class="subbar">
        <button class="bp" style="font-size:12px;padding:9px" onclick="sftpUpload()">⬆ Upload</button>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var profiles=[], quickCmds=[], editId=null;
var conn={active:false,host:'',user:'',profile:null};
var sftpPath='/', sftpItems=[], sftpItemStore=[];
var term=null, resizeObs=null, termOpened=false;

// ── Bridge ────────────────────────────────────────────────────────────────────
function _initBridge(){if(typeof iappyx==='undefined'){setTimeout(_initBridge,50);return;}onReady();}
window.addEventListener('load',function(){setTimeout(_initBridge,200);});

function onReady(){
  profiles  = JSON.parse(iappyx.load('ssh6_profiles')||'[]');
  quickCmds = JSON.parse(iappyx.load('ssh6_qcmds')||'[]');
  if(!quickCmds.length){
    quickCmds=[{l:'ls -la',c:'ls -la\n'},{l:'pwd',c:'pwd\n'},{l:'df -h',c:'df -h\n'},
               {l:'free -h',c:'free -h\n'},{l:'top',c:'top\n'},{l:'uname -a',c:'uname -a\n'},
               {l:'ps aux',c:'ps aux\n'},{l:'tail -f /var/log/syslog',c:'tail -f /var/log/syslog\n'}];
    saveQC();
  }
  renderProfiles();
  loadXterm();
  // Re-fit terminal if screen dimensions changed while away
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'&&termOpened) setTimeout(manualFit,200);
  });
}
function saveP(){iappyx.save('ssh6_profiles',JSON.stringify(profiles));}
function saveQC(){iappyx.save('ssh6_qcmds',JSON.stringify(quickCmds));}

// ── Load xterm.js (cached after first download) ───────────────────────────────
function runScript(code){var s=document.createElement('script');s.textContent=code;document.head.appendChild(s);}

var LIB_MIN={'xt53.js':100000,'xt53.css':1000};

function loadLib(url,filename,globalName,callback){
  var min=LIB_MIN[filename]||5000;
  var code=iappyx.storage.loadFile(filename);
  if(code&&code.length>=min){
    runScript(code);
    if(!globalName||typeof window[globalName]!=='undefined'){callback();return;}
    iappyx.storage.deleteFile(filename); // corrupt — fall through to fetch
  } else if(code){
    iappyx.storage.deleteFile(filename);
  }
  loading(true);
  fetch(url).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
  .then(function(f){
    loading(false);
    if(f.length<min)throw new Error('Too small: '+f.length);
    iappyx.storage.saveFile(filename,f);
    runScript(f);
    callback();
  }).catch(function(e){loading(false);callback(''+e);});
}

function loadXterm(){
  var xtJs ='https://unpkg.com/xterm@5.3.0/lib/xterm.js';
  var xtCss='https://unpkg.com/xterm@5.3.0/css/xterm.css';
  var css=iappyx.storage.loadFile('xt53.css');
  if(css&&css.length>=1000){applyCss(css);}
  else{
    if(css)iappyx.storage.deleteFile('xt53.css');
    fetch(xtCss).then(function(r){return r.text();}).then(function(c){
      if(c.length>500){iappyx.storage.saveFile('xt53.css',c);applyCss(c);}
    }).catch(function(){});
  }
  loadLib(xtJs,'xt53.js','Terminal',function(err){
    if(err){toast('xterm.js needs internet on first launch','err');return;}
    buildTerminal();
  });
}

function applyCss(css){
  var s=document.createElement('style');
  s.textContent=css+
    '\n#term-container .xterm{height:100%!important}'+
    '\n#term-container .xterm-viewport{overflow-y:auto!important}'+
    '\n#term-container .xterm-screen{width:100%!important}';
  document.head.appendChild(s);
}

// ── Terminal build & fit ──────────────────────────────────────────────────────
var fontSize=13; // current font size, persisted

function buildTerminal(){
  if(term)return;
  if(typeof Terminal==='undefined'){toast('xterm.js failed to load','err');return;}
  fontSize=parseInt(iappyx.load('ssh_fontsize')||'13');
  term=new Terminal({
    convertEol:true,cursorBlink:true,fontSize:fontSize,
    fontFamily:'"Courier New",Courier,monospace',
    lineHeight:1.2,scrollback:5000,cols:80,rows:24,
    theme:{
      background:'#0a0a0a',foreground:'#eaeaea',cursor:'#4FC3F7',
      selectionBackground:'rgba(79,195,247,0.3)',
      black:'#000',red:'#FF6B6B',green:'#69F0AE',yellow:'#FFD700',
      blue:'#4FC3F7',magenta:'#C792EA',cyan:'#80CBC4',white:'#eaeaea',
      brightBlack:'#546e7a',brightRed:'#FF8A80',brightGreen:'#CCFF90',
      brightYellow:'#FFE57F',brightBlue:'#80D8FF',brightMagenta:'#EA80FC',
      brightCyan:'#A7FFEB',brightWhite:'#FFF'
    }
  });
  term.onData(function(d){if(conn.active)try{iappyx.ssh.send(d);}catch(e){}});
}

var _cellW=0,_cellH=0;
function measureCell(){
  // Always re-measure — font size may have changed after zoom
  try{
    var ctx=document.createElement('canvas').getContext('2d');
    ctx.font=fontSize+'px "Courier New",Courier,monospace';
    _cellW=ctx.measureText('W').width;
    _cellH=Math.ceil(fontSize*1.2);
  }catch(e){_cellW=fontSize*0.6;_cellH=Math.ceil(fontSize*1.2);}
}

function zoomIn(){
  if(fontSize>=28)return;
  fontSize=Math.min(28,fontSize+1);
  iappyx.save('ssh_fontsize',String(fontSize));
  applyFontSize();
}

function zoomOut(){
  if(fontSize<=8)return;
  fontSize=Math.max(8,fontSize-1);
  iappyx.save('ssh_fontsize',String(fontSize));
  applyFontSize();
}

function applyFontSize(){
  if(!term||!termOpened)return;
  // xterm supports live font size changes via options
  try{ term.options.fontSize=fontSize; }catch(e){}
  // Reset cell cache so manualFit re-measures
  _cellW=0;_cellH=0;
  manualFit();
}

function manualFit(){
  if(!term||!termOpened)return;
  var c=document.getElementById('term-container');
  var w=c.offsetWidth,h=c.offsetHeight;
  if(w<10||h<10)return;
  measureCell();
  var cols=Math.max(20,Math.floor((w-4)/_cellW));
  var rows=Math.max(5,Math.floor((h-4)/_cellH));
  try{term.resize(cols,rows);notifyResize();}catch(e){}
}

function openTerminal(){
  if(termOpened){manualFit();return;}
  if(!term)return;
  var c=document.getElementById('term-container');
  if(c.offsetWidth<10||c.offsetHeight<10){setTimeout(openTerminal,100);return;}
  term.open(c);
  termOpened=true;
  manualFit();
  if(typeof ResizeObserver!=='undefined'){
    resizeObs=new ResizeObserver(function(){if(termOpened)manualFit();});
    resizeObs.observe(c);
  }
  term.focus();
  term.writeln('\x1b[36m╔══════════════════════════════════╗\x1b[0m');
  term.writeln('\x1b[36m║\x1b[0m \x1b[1mSSH Client\x1b[0m \x1b[2mfor iappyxOS\x1b[0m      \x1b[36m║\x1b[0m');
  term.writeln('\x1b[36m║\x1b[0m \x1b[2mConnect from the Profiles tab\x1b[0m   \x1b[36m║\x1b[0m');
  term.writeln('\x1b[36m╚══════════════════════════════════╝\x1b[0m');
}

function notifyResize(){
  if(!conn.active||!term)return;

}

// ── CTRL latch ────────────────────────────────────────────────────────────────
// Tapping CTRL shows an input; the next character typed is sent as Ctrl+char.
// e.g. type 'x' → sends 0x18 (^X, used by nano to exit)
//      type 'a' → sends 0x01 (^A, start of line)
var ctrlLatched=false;

function toggleCtrlLatch(){
  ctrlLatched=!ctrlLatched;
  var btn=document.getElementById('ctrl-latch-btn');
  var bar=document.getElementById('ctrl-bar');
  var inp=document.getElementById('ctrl-input');
  if(ctrlLatched){
    btn.className='tbtn latched';
    bar.className='show';
    inp.value='';
    // Small delay so the toolbar tap doesn't immediately unfocus
    setTimeout(function(){inp.focus();},50);
  } else {
    cancelCtrlLatch();
  }
}

function cancelCtrlLatch(){
  ctrlLatched=false;
  document.getElementById('ctrl-latch-btn').className='tbtn';
  document.getElementById('ctrl-bar').className='';
  document.getElementById('ctrl-input').blur();
}

// Wire up the CTRL input — runs after DOM is ready
window.addEventListener('load',function(){
  var inp=document.getElementById('ctrl-input');
  inp.addEventListener('keydown',function(e){
    if(!ctrlLatched)return;
    var key=e.key;
    // Special keys first
    if(key==='Enter'){e.preventDefault();sendCtrl('\r');return;}
    if(key==='Escape'){e.preventDefault();cancelCtrlLatch();return;}
    if(key.length===1){
      e.preventDefault();
      sendCtrl(key);
    }
  });
  // Also catch input event for on-screen keyboards that don't fire keydown
  inp.addEventListener('input',function(){
    if(!ctrlLatched)return;
    var val=inp.value;
    inp.value='';
    if(val.length>0) sendCtrl(val[val.length-1]);
  });
});

function sendCtrl(key){
  // Convert letter/symbol to control character
  // Ctrl+A=0x01 … Ctrl+Z=0x1A, Ctrl+[=0x1B, Ctrl+\=0x1C, Ctrl+]=0x1D, Ctrl+^=0x1E, Ctrl+_=0x1F
  var c=key.toLowerCase().charCodeAt(0);
  var code=null;
  if(c>=97&&c<=122){        // a-z → 0x01-0x1A
    code=c-96;
  } else if(c===91){        // [ → ESC (0x1B)
    code=0x1B;
  } else if(c===92){        // \ → 0x1C
    code=0x1C;
  } else if(c===93){        // ] → 0x1D
    code=0x1D;
  } else if(c===94||c===54){ // ^ or 6 → 0x1E
    code=0x1E;
  } else if(c===95||c===45){ // _ or - → 0x1F
    code=0x1F;
  } else if(c===32){         // space → 0x00 (Ctrl+Space = NUL)
    code=0x00;
  }
  if(code!==null){
    ts(String.fromCharCode(code));
    // Show brief feedback
    document.getElementById('ctrl-bar-label').textContent='CTRL+'+key.toUpperCase()+' ✓';
    setTimeout(function(){
      document.getElementById('ctrl-bar-label').textContent='CTRL+';
      cancelCtrlLatch();
    },400);
  } else {
    // Unknown combination — just cancel
    cancelCtrlLatch();
  }
}

// ── SSH ───────────────────────────────────────────────────────────────────────
function connectProfile(p){
  if(conn.active)doDisconnect(true);
  loading(true);
  toast('Connecting to '+p.host+'…');
  var opts={host:p.host,port:parseInt(p.port)||22,user:p.user,timeout:15000};
  if(p.authType==='password')opts.password=p.password||'';
  else opts.privateKey=p.privateKey||'';
  var connId='sshc_'+Date.now();
  regCb(connId,function(r){
    if(!r.ok){loading(false);toast('Connect failed: '+(r.error||'?'),'err');return;}
    var shellId='sshs_'+Date.now();
    regCb(shellId,function(r2){
      loading(false);
      if(!r2.ok){toast('Shell failed: '+(r2.error||'?'),'err');try{iappyx.ssh.disconnect();}catch(e){}return;}
      conn={active:true,host:p.host,user:p.user,profile:p};
      window.onSshData=function(d){var t=typeof d==='object'?d.data:d;if(term&&termOpened)term.write(t);};
      iappyx.ssh.onData('window.onSshData');
      window.onSshClose=function(){onLost();};
      iappyx.ssh.onClose('window.onSshClose');
      setConnUI(true);
      toast('Connected','ok');
      sftpPath=p.initDir||'/';
      switchTab('terminal');
      setTimeout(notifyResize,300);
    },15000);
    try{iappyx.ssh.shell(shellId);}catch(e){loading(false);toast('Shell error: '+e.message,'err');}
  },30000);
  try{iappyx.ssh.connect(JSON.stringify(opts),connId);}
  catch(e){loading(false);toast('Error: '+e.message,'err');}
}

function doDisconnect(silent){
  try{iappyx.ssh.disconnect();}catch(e){}
  conn={active:false,host:'',user:'',profile:null};
  setConnUI(false);
  if(!silent){toast('Disconnected');if(term&&termOpened)term.write('\r\n\x1b[33m[Disconnected]\x1b[0m\r\n');}
  renderProfiles();
}

function onLost(){
  if(!conn.active)return;
  conn={active:false,host:'',user:'',profile:null};
  setConnUI(false);
  if(term&&termOpened)term.write('\r\n\x1b[33m[Connection closed]\x1b[0m\r\n');
  renderProfiles();
}

function setConnUI(on){
  document.getElementById('dot').className='dot'+(on?' on':'');
  document.getElementById('conn-lbl').textContent=on?'Connected':'Offline';
  document.getElementById('hdr-sub').textContent=on?(conn.user+'@'+conn.host):'No connection';
  document.getElementById('no-conn').className=on?'hide':'';
  renderProfiles();
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name){
  ['profiles','terminal','sftp'].forEach(function(t){
    document.getElementById('tab-'+t).className='tab'+(t===name?' on':'');
    document.getElementById('view-'+t).className='view'+(t===name?' on':'');
  });
  if(name==='terminal'){
    requestAnimationFrame(function(){
      if(!termOpened)openTerminal();
      else{manualFit();if(term)try{term.focus();}catch(e){}}
    });
  }
  if(name==='sftp'&&conn.active&&!sftpItems.length)sftpList();
}

// ── Profiles ──────────────────────────────────────────────────────────────────
function renderProfiles(){
  var el=document.getElementById('plist');
  if(!profiles.length){
    el.innerHTML='<div class="empty"><div class="ei">🖥</div><div class="et">No profiles yet</div><div class="es">Tap ＋ to add your first server</div></div>';
    return;
  }
  el.innerHTML=profiles.map(function(p,i){
    var a=conn.active&&conn.profile&&conn.profile.id===p.id;
    return '<div class="pcard'+(a?' act':'')+'">'+
      '<div class="pava">'+(a?'✅':'🖥')+'</div>'+
      '<div class="pinfo"><div class="pname">'+esc(p.name)+'</div>'+
      '<div class="phost">'+esc(p.user)+'@'+esc(p.host)+':'+esc(String(p.port||22))+
      ' · '+(p.authType==='key'?'SSH Key':'Password')+'</div></div>'+
      '<div class="pacts">'+
        (a?'<button class="bico bd" onclick="doDisconnect()">⏹</button>'
          :'<button class="bico bc" onclick="connectProfile(profiles['+i+'])">▶</button>')+
        '<button class="bico be" onclick="editProfile('+i+')">✏</button>'+
        '<button class="bico bd" onclick="delProfile('+i+')">🗑</button>'+
      '</div></div>';
  }).join('');
}

function openAddProfile(){
  editId=null;
  document.getElementById('modal-title').textContent='New Profile';
  ['f-name','f-host','f-pass','f-key','f-initdir'].forEach(function(x){document.getElementById(x).value='';});

function editProfile(i){
  var p=profiles[i];editId=p.id;

  document.getElementById('f-name').value=p.name||'';
  document.getElementById('f-host').value=p.host||'';

}
function onAuthChange(){
  var v=document.getElementById('f-auth').value;
  document.getElementById('f-pass-g').style.display=v==='password'?'':'none';
  document.getElementById('f-key-g').style.display=v==='key'?'':'none';
}
function saveProfile(){
  var name=document.getElementById('f-name').value.trim();
  var host=document.getElementById('f-host').value.trim();
  var user=document.getElementById('f-user').value.trim();
  if(!name||!host||!user){toast('Name, host and username required','err');return;}
  var auth=document.getElementById('f-auth').value;
  var p={id:editId||('p'+Date.now()),name:name,host:host,
    port:parseInt(document.getElementById('f-port').value)||22,
    user:user,authType:auth,initDir:document.getElementById('f-initdir').value.trim()||'/'};
  if(auth==='password')p.password=document.getElementById('f-pass').value;
  else p.privateKey=document.getElementById('f-key').value.trim();
  if(editId){var idx=profiles.findIndex(function(x){return x.id===editId;});if(idx>=0)profiles[idx]=p;else profiles.push(p);}
  else profiles.push(p);
  saveP();renderProfiles();closeModal('modal-profile');toast('Saved','ok');
}
function delProfile(i){
  if(conn.active&&conn.profile&&conn.profile.id===profiles[i].id){toast('Disconnect first','err');return;}
  profiles.splice(i,1);saveP();renderProfiles();toast('Deleted');
}

// ── SFTP ──────────────────────────────────────────────────────────────────────
function sftpList(){
  if(!conn.active){toast('Not connected','err');return;}
  loading(true);
  var id='sl_'+Date.now();
  regCb(id,function(r){
    loading(false);
    if(r.ok){sftpItems=r.files||[];renderSftp();}
    else toast('List failed: '+(r.error||'?'),'err');
  },30000);
  try{iappyx.ssh.listDir(sftpPath,id);}catch(e){loading(false);toast(e.message,'err');}
}
function renderSftp(){
  document.getElementById('sftp-path').textContent=sftpPath;
  var el=document.getElementById('sftp-list');
  if(!sftpItems.length){el.innerHTML='<div class="sempty">Empty directory</div>';return;}
  var sorted=sftpItems.slice().sort(function(a,b){
    if(a.isDir!==b.isDir)return a.isDir?-1:1;
    return a.name.localeCompare(b.name);
  });
  sftpItemStore=sorted;
  el.innerHTML=sorted.map(function(it,i){
    return '<div class="sitem" onclick="sftpTap('+i+')">'+
      '<span class="sico">'+(it.isDir?'📁':fIcon(it.name))+'</span>'+
      '<span class="sname">'+esc(it.name)+'</span>'+
      '<span class="ssz">'+(it.isDir?'':fmtSz(it.size||0))+'</span>'+
      (it.isDir
        ?'<span style="color:rgba(79,195,247,.4)">›</span>'
        :'<div class="sacts" onclick="event.stopPropagation()">'+
           '<button class="sbtn sdl" onclick="sftpDl('+i+')">⬇</button>'+
           '<button class="sbtn srm" onclick="sftpRm('+i+')">🗑</button>'+
         '</div>')+
    '</div>';
  }).join('');
}
function sftpTap(i){var it=sftpItemStore[i];if(it&&it.isDir){sftpPath=jp(sftpPath,it.name);sftpList();}}
function sftpUp(){
  if(sftpPath==='/')return;
  var parts=sftpPath.replace(/\/+$/,'').split('/');parts.pop();
  sftpPath=parts.join('/')||'/';sftpList();
}
function sftpGoTo(){var p=prompt('Go to path:',sftpPath);if(p){sftpPath=p;sftpList();}}
function sftpMkdir(){
  var n=prompt('New folder name:');if(!n)return;
  var id='smk_'+Date.now();
  regCb(id,function(r){if(r.ok){toast('Created','ok');sftpList();}else toast(r.error||'Error','err');},15000);
  try{iappyx.ssh.mkdir(jp(sftpPath,n),id);}catch(e){toast(e.message,'err');}
}
function sftpDl(i){
  var it=sftpItemStore[i];if(!it)return;
  loading(true);toast('Downloading…');
  var id='sdl_'+Date.now();
  regCb(id,function(r){
    loading(false);
    if(r.ok){var ok=iappyx.storage.copyFileToDownloads(r.filePath,it.name,gMime(it.name));toast(ok?'Saved to Downloads':'Save failed',ok?'ok':'err');}
    else toast('Download failed: '+(r.error||'?'),'err');
  },60000);
  try{iappyx.ssh.download(jp(sftpPath,it.name),it.name,id);}catch(e){loading(false);toast(e.message,'err');}
}
function sftpRm(i){
  var it=sftpItemStore[i];if(!it)return;
  if(!confirm('Delete '+it.name+'?'))return;
  var id='srm_'+Date.now();
  regCb(id,function(r){if(r.ok){toast('Deleted','ok');sftpList();}else toast(r.error||'Error','err');},15000);
  try{iappyx.ssh.exec('rm -rf "'+jp(sftpPath,it.name).replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'"',id);}
  catch(e){toast(e.message,'err');}
}
function sftpUpload(){
  if(!conn.active){toast('Not connected','err');return;}
  var id='spk_'+Date.now();
  regCb(id,function(r){
    if(!r.ok){toast('Cancelled');return;}
    loading(true);toast('Uploading…');
    var id2='sul_'+Date.now();
    regCb(id2,function(r2){
      loading(false);
      if(r2.ok){toast('Upload complete','ok');sftpList();}else toast('Upload failed: '+(r2.error||'?'),'err');
    },120000);
    try{iappyx.ssh.upload(r.filePath,jp(sftpPath,r.name||'file'),id2);}catch(e){loading(false);toast(e.message,'err');}
  },60000);
  try{iappyx.storage.pickFile(id);}catch(e){toast(e.message,'err');}
}

function addQuickCmd(){

function delQC(i){quickCmds.splice(i,1);saveQC();renderQC();}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).className='overlay';}
function closeModal(id){document.getElementById(id).className='overlay hide';}
document.addEventListener('click',function(e){if(e.target.classList.contains('overlay'))e.target.className='overlay hide';});

// ── Callback registry ─────────────────────────────────────────────────────────
function regCb(id,fn,timeout){
  window._iappyxCb=window._iappyxCb||{};
  window._iappyxCb[id]=fn;
  if(timeout)setTimeout(function(){if(window._iappyxCb[id]){delete window._iappyxCb[id];loading(false);}},timeout);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function loading(on){document.getElementById('lbar').className=on?'on':'';}
var _tt=null;
function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='on'+(type?' '+type:'');
  if(_tt)clearTimeout(_tt);_tt=setTimeout(function(){el.className='';},2800);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function jp(base,name){return(base==='/'?'':base.replace(/\/+$/,''))+'/'+name;}
function fmtSz(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':b<1073741824?(b/1048576).toFixed(1)+'MB':(b/1073741824).toFixed(1)+'GB';}
function fIcon(n){var e=(n.split('.').pop()||'').toLowerCase();return{txt:'📄',md:'📄',log:'📋',sh:'📜',bash:'📜',py:'🐍',js:'📜',html:'🌐',json:'📋',csv:'📊',pdf:'📕',jpg:'🖼',jpeg:'🖼',png:'🖼',zip:'📦',tar:'📦',gz:'📦',mp3:'🎵',mp4:'🎬',conf:'⚙',cfg:'⚙',env:'⚙',db:'🗄',sql:'🗄'}[e]||'📄';}
function gMime(n){var e=(n.split('.').pop()||'').toLowerCase();return{jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',pdf:'application/pdf',zip:'application/zip',txt:'text/plain',mp3:'audio/mpeg',mp4:'video/mp4'}[e]||'application/octet-stream';}
</script>
