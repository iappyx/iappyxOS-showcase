// PODCAST ENGINE
// ════════════════════════════════════════════════════════════════════════

var PODCASTS = [];
var podIdx = -1;
var podEpIdx = -1;
var podPlaying = false;
var podDuration = 0;
var podPosition = 0;
var podScrubbing = false;
var podPositionTimer = null;
var podStartingUp = false;
var POD_ACCENT = '#4FC3F7';

var podVizActive = false;
var podVizRafId = null;
var podVizFftData = null;
var podVizWaveData = null;
var podVizSmoothVals = null;
var podVizPeak = 1;
var podVizFallbackH = [];
var podVizMode = 0;
function podGetVizMode(){return podVizMode;}
function podCycleViz(){podVizMode=(podVizMode+1)%VIZ_MODES;buildVizDots();}

function podSave(){
  var data=PODCASTS.map(function(p){
    return {id:p.id,title:p.title,author:p.author,feedUrl:p.feedUrl,artUrl:p.artUrl,positions:p.positions||{}};
  });
  iappyx.save('pod_subs',JSON.stringify(data));
}
function loadPodcasts(){
  var raw=iappyx.load('pod_subs');if(!raw)return;
  try{
    PODCASTS=(JSON.parse(raw)||[]).map(function(p){
      return {id:p.id,title:p.title,author:p.author,feedUrl:p.feedUrl,artUrl:p.artUrl||'',episodes:[],positions:p.positions||{}};
    });
  }catch(e){PODCASTS=[];}
}
function podRestoreState(){
  var raw=iappyx.load('pod_cur');if(!raw)return;
  try{
    var sp=JSON.parse(raw);
    if(typeof sp.podIdx==='number'&&sp.podIdx>=0&&sp.podIdx<PODCASTS.length){
      podIdx=sp.podIdx;podEpIdx=sp.epIdx||0;
      var p=PODCASTS[podIdx];
      if(p&&(!p.episodes||!p.episodes.length)&&sp.url){
        p.episodes=[];p.episodes[sp.epIdx]={id:'restored',audioUrl:sp.url,title:sp.title||'',pubDate:'',duration:''};
      }
    }
  }catch(e){}
}
function podSaveCurrent(){
  var p=PODCASTS[podIdx];
  var ep=p&&p.episodes?p.episodes[podEpIdx]:null;
  if(!ep){iappyx.remove('pod_cur');return;}
  iappyx.save('pod_cur',JSON.stringify({podIdx:podIdx,epIdx:podEpIdx,url:ep.audioUrl,title:ep.title}));
}
function podClearCurrent(){iappyx.remove('pod_cur');}

function podSelect(idx){
  if(appPlaying)stopStream();
  cancelReconnect();
  if(podPlaying&&podIdx!==idx)podStop();
  podIdx=idx;
  if(podIdx<0||podIdx>=PODCASTS.length)podIdx=0;
  switchMode('podcast');
  document.getElementById('playerCard').style.display='flex';
  document.getElementById('emptyState').style.display='none';
  applyPodcast(podIdx);
  buildItemBar();
  requestAnimationFrame(function(){requestAnimationFrame(function(){podBuildViz();});});
}
function selectPodcast(idx){podSelect(idx);}

function applyPodcast(idx){
  var p=PODCASTS[idx];if(!p)return;
  appMode='podcast';
  try{iappyx.save('app_mode','podcast');}catch(e){}
  document.documentElement.style.setProperty('--accent',POD_ACCENT);
  var logoEl=document.getElementById('logoDisplay');
  var artImg=document.getElementById('artImg');
  artImg.classList.remove('visible');artImg.src='';
  if(p.artUrl){
    artImg.onload=function(){artImg.classList.add('visible');logoEl.style.display='none';};
    artImg.onerror=function(){artImg.classList.remove('visible');logoEl.style.display='';logoEl.textContent='🎙';logoEl.style.color=POD_ACCENT;};
    artImg.src=p.artUrl;
  } else {logoEl.style.display='';logoEl.textContent='🎙';logoEl.style.color=POD_ACCENT;}
  document.getElementById('mainTitle').textContent=podEpIdx>=0&&podPlaying&&p.episodes[podEpIdx]?p.episodes[podEpIdx].title:p.title;
  document.getElementById('mainMeta').textContent=p.author||'';
  setStatus(podPlaying?T('statusLive'):T('statusReady'),podPlaying?'live':'');
  if(!p.episodes.length)fetchFeed(p.feedUrl,function(eps){if(eps.length)p.episodes=eps;});
}

function podStart(epIdx){
  var p=PODCASTS[podIdx];
  if(!p||!p.episodes||!p.episodes[epIdx])return;
  var ep=p.episodes[epIdx];
  // FIX: kill any zombie radio reconnect timer before starting podcast
  cancelReconnect();
  switchMode('podcast');
  if(appPlaying)stopStream();
  try{iappyx.audio.pause();}catch(e){}
  try{iappyx.audio.stop();}catch(e){}
  podPlaying=false;
  podUpdateUI(false);
  setStatus(T('statusLoading'),'');
  setLoading(true);
  podEpIdx=epIdx; // commit episode selection before any async work
  var tok=nextPlayToken();
  setTimeout(function(){
    if(tok!==playToken)return; // stale — user tapped something else
    var p2=PODCASTS[podIdx];
    var ep2=p2&&p2.episodes?p2.episodes[epIdx]:null;
    if(!ep2||podEpIdx!==epIdx)return;
    // CRITICAL: setMediaSession BEFORE play — otherwise play() starts the in-process
    // ExoPlayer, then setMediaSession kills it and spawns a second AudioService player,
    // leaving both audible during the async handoff. Setting session first routes
    // play() straight to AudioService = single stream + working lock-screen controls.
    try{iappyx.audio.setMediaSession(JSON.stringify({title:ep2.title,artist:p2.title,album:'Podcast'}));}catch(e){}
    try{iappyx.audio.play(ep2.audioUrl);}catch(e){}
    var saved=(p2.positions||{})[ep2.id]||0;
    if(saved>5)setTimeout(function(){if(tok!==playToken)return;try{iappyx.audio.seekTo(saved*1000);}catch(e){}},1500);
    podPlaying=true;
    podSaveCurrent();
    try{iappyx.audio.requestFocus('window.onAudioFocus');}catch(e){}
    podStartingUp=true;setTimeout(function(){podStartingUp=false;},1000);
    podUpdateUI(true);
    setStatus(T('statusLive'),'live');
    setLoading(false);
    podStartPositionTimer();
    podStartViz();
    document.getElementById('mainTitle').textContent=ep2.title;
    buildItemBar();
    try{iappyx.vibration.tick();}catch(e){}
  },150);
}

function podStop(){
  nextPlayToken();
  try{iappyx.audio.pause();}catch(e){}
  try{iappyx.audio.stop();}catch(e){}
  podPlaying=false;
  podUpdateUI(false);
  setStatus(T('statusStopped'),'');
  setLoading(false);
  podStopPositionTimer();
  podStopViz();
  podClearCurrent();
  try{iappyx.audio.abandonFocus();}catch(e){}
  var p=PODCASTS[podIdx];var ep=p&&p.episodes?p.episodes[podEpIdx]:null;
  if(ep)try{iappyx.audio.setMediaSession(JSON.stringify({title:ep.title,artist:p.title,album:'Podcast'}));}catch(e){}
}

function togglePodPlay(){
  if(podEpIdx<0){openEpisodes();return;}
  if(podPlaying)podStop();else podStart(podEpIdx);
}

function podUpdateUI(playing){
  var btn=document.getElementById('btnPlay');
  var ring=document.getElementById('logoRing');
  var glow=document.getElementById('bgGlow');
  var scrub=document.getElementById('podScrubCard');
  if(playing){
    btn.classList.add('playing');
    ring.classList.add('playing');ring.style.borderColor='transparent';
    glow.className='bg-glow playing';
    if(scrub)scrub.style.display='flex';
  } else {
    btn.classList.remove('playing');
    ring.classList.remove('playing');ring.style.borderColor='';
    glow.className='bg-glow stopped';
    if(scrub)scrub.style.display='none';
    podDuration=0;podPosition=0;
    var sc=document.getElementById('podScrubber');if(sc)sc.value=0;
    document.getElementById('podTimeEl').textContent='0:00';
    document.getElementById('podDurEl').textContent='0:00';
  }
}

function podNext(){if(PODCASTS.length)podSelect((podIdx+1)%PODCASTS.length);}
function podPrev(){if(PODCASTS.length)podSelect((podIdx-1+PODCASTS.length)%PODCASTS.length);}

function podSeek(pct){
  podScrubbing=false;
  try{
    var dur=podDuration>0?podDuration:iappyx.audio.getDuration()/1000;
    if(dur>0)iappyx.audio.seekTo((pct/100)*dur*1000);
  }catch(e){}
}
function podSkip(secs){
  try{iappyx.audio.seekTo(Math.max(0,(iappyx.audio.getCurrentPosition()/1000+secs)*1000));}catch(e){}
}
function podUpdateScrubber(){
  if(podScrubbing)return;
  var pct=podDuration>0?(podPosition/podDuration)*100:0;
  var sc=document.getElementById('podScrubber');if(sc)sc.value=pct.toFixed(1);
  document.getElementById('podTimeEl').textContent=fmtTime(podPosition);
  document.getElementById('podDurEl').textContent=fmtTime(podDuration);
}
function fmtTime(s){s=Math.floor(s||0);var m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec;}

function podStartPositionTimer(){
  podStopPositionTimer();
  podPositionTimer=setInterval(function(){
    if(!podPlaying)return;
    try{
      var pos=iappyx.audio.getCurrentPosition()/1000;
      var dur=iappyx.audio.getDuration()/1000;
      if(dur>0&&pos>=0){
        podPosition=pos;podDuration=dur;
        podUpdateScrubber();
        podSavePosition();
      }
    }catch(e){}
  },1000);
}
function podStopPositionTimer(){if(podPositionTimer){clearInterval(podPositionTimer);podPositionTimer=null;}}
function podSavePosition(){
  var p=PODCASTS[podIdx];if(!p)return;
  var ep=p.episodes?p.episodes[podEpIdx]:null;if(!ep)return;
  if(!p.positions)p.positions={};
  if(podDuration>0&&(podDuration-podPosition)<30)delete p.positions[ep.id];
  else p.positions[ep.id]=Math.floor(podPosition);
  podSave();
}

function podBuildViz(){
  var canvas=document.getElementById('visualizer');
  if(!canvas||!canvas.offsetWidth){requestAnimationFrame(podBuildViz);return;}
  if(!vizCtx){
    var dpr=window.devicePixelRatio||1,sz=canvas.offsetWidth;
    canvas.width=sz*dpr;canvas.height=sz*dpr;
    vizCtx=canvas.getContext('2d');vizCtx.scale(dpr,dpr);
  }
  podInitState();
  var dots=document.getElementById('vizDots');
  if(dots){dots.innerHTML='';for(var i=0;i<VIZ_MODES;i++){var d=document.createElement('div');d.className='viz-dot'+(i===podVizMode?' active':'');dots.appendChild(d);}}
}
window.onPodViz=function(data){
  var d=typeof data==='string'?JSON.parse(data):data;
  if(d.fft)podVizFftData=d.fft;if(d.waveform)podVizWaveData=d.waveform;
};
// Always init pod viz state — independent of whether radio's buildVisualizer
// already claimed vizCtx. Without this, podVizFallbackH stays empty and podGetVals
// produces NaN = blank canvas on first-ever podcast play.
function podInitState(){
  if(!podVizSmoothVals||podVizSmoothVals.length!==NUM_BARS)podVizSmoothVals=new Array(NUM_BARS).fill(0);
  if(!podVizFallbackH||podVizFallbackH.length!==NUM_BARS){
    podVizFallbackH=[];for(var i=0;i<NUM_BARS;i++)podVizFallbackH.push(Math.random()*0.3+0.05);
  }
  podVizPeak=1;
}

function podStartViz(){
  var canvas=document.getElementById('visualizer');
  podVizFftData=null;podVizWaveData=null;
  podInitState(); // must run before any podDrawViz even if vizCtx is reused from radio
  if(!vizCtx)podBuildViz();
  for(var i=0;i<podVizSmoothVals.length;i++)podVizSmoothVals[i]=0;
  podVizActive=true;
  canvas.classList.add('active');
  if(podVizRafId)cancelAnimationFrame(podVizRafId);
  (function loop(){if(!podVizActive)return;podVizRafId=requestAnimationFrame(loop);podDrawViz();})();
  var attempts=0;
  function tryStart(){
    if(!podVizActive)return;
    try{
      var playing=false;try{playing=iappyx.audio.isPlaying();}catch(e){}
      if(playing){
        try{iappyx.audio.startVisualizer('window.onPodViz');}catch(e){}
        setTimeout(function(){
          if(!podVizActive)return;
          if(!podVizFftData&&!podVizWaveData){
            try{iappyx.audio.stopVisualizer();}catch(e){}
            try{iappyx.audio.startVisualizer('window.onPodViz');}catch(e){}
          }
        },3000);
      } else if(attempts<30){attempts++;setTimeout(tryStart,500);}
    }catch(e){}
  }
  setTimeout(tryStart,500);
}
function podStopViz(){
  podVizActive=false;
  if(!vizActive)try{iappyx.audio.stopVisualizer();}catch(e){}
  if(podVizRafId){cancelAnimationFrame(podVizRafId);podVizRafId=null;}
  podVizFftData=null;podVizWaveData=null;
  var canvas=document.getElementById('visualizer');
  if(!vizActive&&vizCtx&&canvas)vizCtx.clearRect(0,0,canvas.offsetWidth||260,canvas.offsetWidth||260);
  if(!vizActive&&canvas)canvas.classList.remove('active');
}
function podDrawViz(){
  if(!vizCtx)return;
  var canvas=document.getElementById('visualizer');
  var sz=canvas.offsetWidth||260;vizCtx.clearRect(0,0,sz,sz);
  var vals=podGetVals();
  if(podVizMode===0)drawRadialWith(sz,POD_ACCENT,vals);
  else if(podVizMode===1)drawFreqBarsWith(sz,POD_ACCENT,vals);
  else if(podVizMode===2)drawHorizWaveWith(sz,POD_ACCENT,podGetWave());
  else drawBloomWith(sz,POD_ACCENT,vals);
}
// podcast-specific draw helpers — just re-use radio draws but with forced color
function drawRadialWith(sz,col,vals){var cx=sz/2,cy=sz/2,n=NUM_BARS,ir=sz/2*0.70,ml=sz/2*0.28,lw=Math.max(1.5,(Math.PI*2*ir/n)*0.50);for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2-Math.PI/2,v=vals[i],bl=Math.max(1,v*ml);vizCtx.strokeStyle=hexToRgba(col,0.12+v*0.88);vizCtx.lineWidth=lw;vizCtx.lineCap='round';vizCtx.beginPath();vizCtx.moveTo(cx+Math.cos(a)*ir,cy+Math.sin(a)*ir);vizCtx.lineTo(cx+Math.cos(a)*(ir+bl),cy+Math.sin(a)*(ir+bl));vizCtx.stroke();}}
function drawFreqBarsWith(sz,col,vals){var n=NUM_BARS,pad=sz*0.04,bw=(sz-pad*2)/n,gap=Math.max(1,bw*0.18),cy=sz/2,maxH=sz*0.44;var grad=vizCtx.createLinearGradient(0,cy-maxH,0,cy);grad.addColorStop(0,hexToRgba(col,0.95));grad.addColorStop(0.5,hexToRgba(col,0.55));grad.addColorStop(1,hexToRgba(col,0.15));var gradB=vizCtx.createLinearGradient(0,cy,0,cy+maxH);gradB.addColorStop(0,hexToRgba(col,0.15));gradB.addColorStop(1,hexToRgba(col,0.04));for(var i=0;i<n;i++){var x=pad+i*bw,v=vals[i],h=Math.max(2,v*maxH),w=bw-gap;vizCtx.fillStyle=grad;vizCtx.beginPath();var r=Math.min(w/2,3),bx=x+gap/2,by=cy-h;vizCtx.moveTo(bx+r,by);vizCtx.lineTo(bx+w-r,by);vizCtx.arcTo(bx+w,by,bx+w,by+r,r);vizCtx.lineTo(bx+w,cy);vizCtx.lineTo(bx,cy);vizCtx.arcTo(bx,by,bx+r,by,r);vizCtx.closePath();vizCtx.fill();vizCtx.fillStyle=gradB;vizCtx.fillRect(bx,cy,w,Math.max(1,h*0.35));if(v>0.15){vizCtx.fillStyle=hexToRgba(col,0.9);vizCtx.fillRect(bx,cy-h-3,w,2);}}}
function drawHorizWaveWith(sz,col,wave){var n=wave.length,cy=sz/2,amp=sz*0.36,step=sz/(n-1);vizCtx.beginPath();vizCtx.moveTo(0,cy);for(var i=0;i<n;i++){var x=i*step,y=cy-(wave[i]-0.5)*2*amp;if(i===0)vizCtx.lineTo(x,y);else{var px=(i-0.5)*step;vizCtx.quadraticCurveTo(px,0,x,y);}}vizCtx.lineTo(sz,cy);vizCtx.closePath();var fg=vizCtx.createLinearGradient(0,cy-amp,0,cy);fg.addColorStop(0,hexToRgba(col,0.28));fg.addColorStop(1,hexToRgba(col,0.02));vizCtx.fillStyle=fg;vizCtx.fill();vizCtx.beginPath();for(var i=0;i<n;i++){var x=i*step,y=cy-(wave[i]-0.5)*2*amp;if(i===0)vizCtx.moveTo(x,y);else{var cpx=(i-0.5)*step,cpy=cy-(wave[i-1]-0.5)*2*amp;vizCtx.quadraticCurveTo(cpx,cpy,x,y);}}vizCtx.strokeStyle=hexToRgba(col,0.9);vizCtx.lineWidth=2;vizCtx.lineJoin='round';vizCtx.stroke();}
function drawBloomWith(sz,col,vals){var cx=sz/2,cy=sz/2,n=NUM_BARS,rings=3;for(var ring=0;ring<rings;ring++){var rr=sz/2*(0.46+ring*0.14),rn=Math.floor(n/(ring+1)),ra=0.7-ring*0.2;for(var i=0;i<rn;i++){var a=(i/rn)*Math.PI*2-Math.PI/2+(ring*Math.PI*0.07),v=vals[Math.floor(i/rn*n)],dr=Math.max(1.5,v*sz*0.045+1.5);vizCtx.beginPath();vizCtx.arc(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr,dr,0,Math.PI*2);vizCtx.fillStyle=hexToRgba(col,ra*v+0.07);vizCtx.fill();}}var mv=0;for(var i=0;i<n;i++)mv+=vals[i];mv/=n;var pr=sz/2*0.42*mv;if(pr>1){var g=vizCtx.createRadialGradient(cx,cy,0,cx,cy,pr);g.addColorStop(0,hexToRgba(col,0.2*mv));g.addColorStop(1,hexToRgba(col,0));vizCtx.beginPath();vizCtx.arc(cx,cy,pr,0,Math.PI*2);vizCtx.fillStyle=g;vizCtx.fill();}}
function podGetVals(){
  var n=NUM_BARS,raw=new Array(n);
  if(podVizFftData&&podVizFftData.length>=4){
    var mags=[],fp=0;
    for(var i=1;i<=63;i++){var re=Number(podVizFftData[i*2]||0);if(re>127)re-=256;var im=Number(podVizFftData[i*2+1]||0);if(im>127)im-=256;var mag=Math.sqrt(re*re+im*im);mags.push(mag);if(mag>fp)fp=mag;}
    if(fp>podVizPeak)podVizPeak=fp;else podVizPeak=podVizPeak*0.97+fp*0.03;if(podVizPeak<1)podVizPeak=1;
    var ub=Math.ceil(mags.length*0.6);
    for(var i=0;i<n;i++){var lin=mags[Math.floor(i/n*ub)]/podVizPeak;lin=Math.max(0,(lin-0.05)/0.95);raw[i]=Math.log1p(lin*9)/Math.log1p(9);}
  } else if(podVizWaveData&&podVizWaveData.length){
    var step=Math.max(1,Math.floor(podVizWaveData.length/n));
    for(var i=0;i<n;i++)raw[i]=Math.abs((Number(podVizWaveData[i*step]||128)-128)/128);
  } else {
    for(var i=0;i<n;i++){podVizFallbackH[i]+=(Math.random()-0.5)*0.06;podVizFallbackH[i]=Math.max(0.04,Math.min(0.7,podVizFallbackH[i]));raw[i]=podVizFallbackH[i];}
  }
  if(!podVizSmoothVals)podVizSmoothVals=new Array(n).fill(0);
  for(var i=0;i<n;i++){
    if(raw[i]>podVizSmoothVals[i])podVizSmoothVals[i]=podVizSmoothVals[i]*0.4+raw[i]*0.6;
    else podVizSmoothVals[i]=podVizSmoothVals[i]*0.85+raw[i]*0.15;
  }
  return podVizSmoothVals;
}
function podGetWave(){
  var n=NUM_BARS,wave=new Array(n).fill(0.5);
  if(podVizWaveData&&podVizWaveData.length){var step=Math.max(1,Math.floor(podVizWaveData.length/n));for(var i=0;i<n;i++)wave[i]=Number(podVizWaveData[i*step]||128)/255;}
  else{for(var i=0;i<n;i++)wave[i]=0.5+(podVizFallbackH[i]||0.1)*Math.sin(Date.now()/500+i*0.25)*0.5;}
  return wave;
}

function openEpisodes(){
  if(document.getElementById('episodesOverlay').classList.contains('visible'))return;
  var p=PODCASTS[podIdx];if(!p){openPodSearch();return;}
  document.getElementById('episodesSheetTitle').textContent=p.title;
  buildEpisodesList(p);
  document.getElementById('episodesOverlay').classList.add('visible');
}
function closeEpisodes(){
  document.getElementById('episodesOverlay').classList.remove('visible');
}

function buildEpisodesList(p){
  var el=document.getElementById('episodesList');
  if(!p.episodes||!p.episodes.length){
    el.innerHTML='<div class="pod-loading">'+T('podLoading')+'</div>';
    fetchFeed(p.feedUrl,function(eps,err){
      if(err||!eps.length){el.innerHTML='<div class="pod-loading">'+(err||T('podLoadFailed'))+'</div>';return;}
      p.episodes=eps;buildEpisodesList(p);
    });
    return;
  }
  fetchFeed(p.feedUrl,function(eps,err){
    if(!err&&eps.length){p.episodes=eps;
      if(document.getElementById('episodesOverlay').classList.contains('visible'))buildEpisodesList(p);}
  });
  el.innerHTML='';
  p.episodes.forEach(function(ep,i){
    var pos=(p.positions||{})[ep.id]||0;
    var dur=podParseDur(ep.duration);
    var pct=dur>0?Math.min(100,(pos/dur)*100):0;
    var active=podPlaying&&podEpIdx===i;
    var row=document.createElement('div');row.className='pod-episode';
    var btn=document.createElement('button');btn.className='pod-ep-play'+(active?' playing':'');
    btn.innerHTML=active
      ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>'
      :'<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
    var info=document.createElement('div');info.className='pod-ep-info';
    var t=document.createElement('div');t.className='pod-ep-title';t.textContent=ep.title;
    var m=document.createElement('div');m.className='pod-ep-meta';
    var meta=[];
    if(ep.pubDate)meta.push(podFmtDate(ep.pubDate));
    if(ep.duration)meta.push(podFmtDur(ep.duration));
    m.textContent=meta.join(' · ');
    info.appendChild(t);info.appendChild(m);
    if(pct>0){var pg=document.createElement('div');pg.className='pod-ep-progress';var pb=document.createElement('div');pb.className='pod-ep-progress-bar';pb.style.width=pct.toFixed(1)+'%';pg.appendChild(pb);info.appendChild(pg);}
    row.appendChild(btn);row.appendChild(info);
    el.appendChild(row);
    (function(epIndex){
      row.addEventListener('click',function(evt){
        evt.stopPropagation();
        setTimeout(function(){closeEpisodes();podStart(epIndex);},0);
      });
    })(i);
  });
}

function fetchFeed(url,cb){
  var id='f_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  window._iappyxCb=window._iappyxCb||{};
  var t=setTimeout(function(){delete window._iappyxCb[id];cb([],T('podLoadFailed'));},20000);
  window._iappyxCb[id]=function(r){clearTimeout(t);if(!r.ok){cb([],T('podLoadFailed'));return;}cb(podParseRSS(r.body),null);};
  iappyx.httpClient.request(JSON.stringify({url:url,method:'GET',timeout:15000}),id);
}
function podParseRSS(xml){
  var eps=[];
  try{
    var doc=new DOMParser().parseFromString(xml,'application/xml');
    doc.querySelectorAll('item').forEach(function(item,i){
      if(i>=50)return;
      var title=(item.querySelector('title')||{}).textContent||'Untitled';
      var enc=item.querySelector('enclosure');
      var url=enc?enc.getAttribute('url'):'';
      if(!url){var mc=item.querySelector('content');if(mc)url=mc.getAttribute('url')||'';}
      if(!url)return;
      var guid=(item.querySelector('guid')||{textContent:i}).textContent.replace(/[^a-zA-Z0-9]/g,'').substring(0,20)||('ep'+i);
      eps.push({id:'ep_'+guid,title:title.trim(),audioUrl:url,pubDate:(item.querySelector('pubDate')||{}).textContent||'',duration:podTagText(item,'duration')});
    });
  }catch(e){}
  return eps;
}
function podTagText(el,tag){var f=el.getElementsByTagName(tag);return f.length?f[0].textContent:'';}
function podFmtDate(s){if(!s)return'';try{return new Date(s).toLocaleDateString(LANG,{month:'short',day:'numeric',year:'numeric'});}catch(e){return'';}}
function podFmtDur(s){
  if(!s)return'';if(/^\d+:\d+/.test(s))return s;
  var n=parseInt(s);if(isNaN(n))return s;
  var h=Math.floor(n/3600),m=Math.floor((n%3600)/60);
  return h>0?h+'h '+m+'m':m>0?m+'m':'';
}
function podParseDur(s){
  if(!s)return 0;var p=s.split(':').map(Number);
  if(p.length===3)return p[0]*3600+p[1]*60+p[2];
  if(p.length===2)return p[0]*60+p[1];
  var n=parseInt(s);return isNaN(n)?0:n;
}

function openPodSearch(){
  document.getElementById('podSearchOverlay').classList.add('visible');
  document.getElementById('podSearchResults').innerHTML='<div class="pod-loading">'+T('podSearchHint')+'</div>';
  setTimeout(function(){document.getElementById('podSearchInput').focus();},300);
}
function closePodSearch(){
  document.getElementById('podSearchOverlay').classList.remove('visible');
  document.getElementById('podSearchInput').value='';
}
function doPodSearch(){
  var q=document.getElementById('podSearchInput').value.trim();if(!q)return;
  document.getElementById('podSearchResults').innerHTML='<div class="pod-loading">'+T('searchSearching')+'</div>';
  var id='ps_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  window._iappyxCb=window._iappyxCb||{};
  var t=setTimeout(function(){delete window._iappyxCb[id];document.getElementById('podSearchResults').innerHTML='<div class="pod-loading">'+T('podSearchFailed')+'</div>';},15000);
  window._iappyxCb[id]=function(r){
    clearTimeout(t);
    if(!r.ok){document.getElementById('podSearchResults').innerHTML='<div class="pod-loading">'+T('podSearchFailed')+'</div>';return;}
    var data;try{data=JSON.parse(r.body);}catch(e){document.getElementById('podSearchResults').innerHTML='<div class="pod-loading">'+T('podSearchFailed')+'</div>';return;}
    podRenderSearchResults(data.results||[]);
  };
  iappyx.httpClient.request(JSON.stringify({url:'https://itunes.apple.com/search?media=podcast&country='+resolvedCountry()+'&limit=25&term='+encodeURIComponent(q),method:'GET',timeout:12000}),id);
}
function podRenderSearchResults(items){
  var el=document.getElementById('podSearchResults');
  if(!items.length){el.innerHTML='<div class="pod-loading">'+T('podSearchNone')+'</div>';return;}
  var ids=PODCASTS.map(function(p){return p.id;});
  el.innerHTML='';
  items.forEach(function(item){
    if(!item.feedUrl)return;
    var subbed=ids.indexOf(String(item.collectionId))>=0;
    var row=document.createElement('div');row.className='pod-result';
    var art=item.artworkUrl100?'<img class="pod-result-art" src="'+escapeHtml(item.artworkUrl100)+'" alt="" onerror="this.style.display=&quot;none&quot;;this.nextSibling.style.display=&quot;flex&quot;"><div class="pod-result-art-fb" style="display:none">🎙️</div>':'<div class="pod-result-art-fb">🎙️</div>';
    row.innerHTML=art+'<div class="pod-result-info"><div class="pod-result-title">'+escapeHtml(item.collectionName||'')+'</div><div class="pod-result-author">'+escapeHtml(item.artistName||'')+'</div></div>'+(subbed?'<div class="pod-result-added">✓</div>':'<div class="pod-result-add">+</div>');
    if(!subbed){
      row.querySelector('.pod-result-add').onclick=function(e){
        e.stopPropagation();podSubscribe(item);
        row.querySelector('.pod-result-add').outerHTML='<div class="pod-result-added">✓</div>';
        ids.push(String(item.collectionId));
      };
    }
    el.appendChild(row);
  });
}
function podSubscribe(item){
  PODCASTS.push({id:String(item.collectionId),title:item.collectionName||'Podcast',author:item.artistName||'',feedUrl:item.feedUrl,artUrl:item.artworkUrl600||item.artworkUrl100||'',episodes:[],positions:{}});
  podSave();buildItemBar();try{iappyx.vibration.tick();}catch(e){}
}
function podUnsubscribe(idx){
  if(podIdx===idx&&podPlaying)podStop();
  PODCASTS.splice(idx,1);podSave();
  podIdx=Math.max(0,PODCASTS.length-1);
  renderAll();try{iappyx.vibration.tick();}catch(e){}
}

window.addEventListener('beforeunload',function(){
  stopPreview();stopViz();podStopViz();
  [sleepTimerId,wakeTimerId,listenIntervalId,fadeIntervalId].forEach(function(t){if(t)clearInterval(t);});
  cancelReconnect();
  if(podPlaying)podSavePosition();
  try{iappyx.sensor.stop();}catch(e){}
});
</script>
