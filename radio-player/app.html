<!DOCTYPE html>
<html lang="nl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Radio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0d0d1a;color:#eaeaea;min-height:100vh;overflow-x:hidden}
:root{--bg:#0d0d1a;--surface:#1a1a2e;--text:#eaeaea;--muted:rgba(255,255,255,0.45);--success:#69F0AE;--error:#FF6B6B;--accent:#4FC3F7;--r12:12px;--r50:50px;}

/* ── Loading bar ── */
.loading-bar{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);background-size:200% 100%;animation:shimmer 1.4s infinite;display:none;z-index:200;}
.loading-bar.visible{display:block;}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* ── Background glow ── */
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-glow::before{content:'';position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:500px;height:500px;border-radius:50%;opacity:0;transition:background 1.5s ease,opacity 1s ease;background:radial-gradient(ellipse,var(--accent) 0%,transparent 65%);}
.bg-glow.playing::before{opacity:0.09;animation:pulse-glow 4s ease-in-out infinite;}
@keyframes pulse-glow{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.15);}}

/* ── App shell ── */
#app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}

/* ── Station bar ── */
.station-bar{position:relative;z-index:10;padding:16px 16px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;align-items:center;flex-shrink:0;}
.station-bar::-webkit-scrollbar{display:none;}
.station-pill{flex-shrink:0;padding:7px 16px;border-radius:var(--r50);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;min-height:36px;display:flex;align-items:center;gap:7px;touch-action:manipulation;letter-spacing:0.2px;}
.station-pill.active{color:#fff;border-color:var(--accent);background:rgba(79,195,247,0.1);}
.station-pill .pin-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:0.7;}

/* ── Manage sheet ── */
.manage-list{display:flex;flex-direction:column;padding-bottom:8px;}
.manage-section-header{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);padding:16px 0 8px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:4px;}
.manage-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);touch-action:none;}
.manage-row.dragging{opacity:0.3;}
.manage-row.drag-above{border-top:2px solid var(--accent);margin-top:-1px;}
.manage-row.drag-below{border-bottom:2px solid var(--accent);}
.manage-favicon{width:36px;height:36px;border-radius:10px;object-fit:cover;background:#1a1a2e;flex-shrink:0;}
.manage-favicon-fb{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:900;}
.manage-info{flex:1;min-width:0;}
.manage-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.manage-meta{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.manage-pin{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.manage-pin.on{border-color:var(--accent);background:rgba(79,195,247,0.1);color:var(--accent);}
.manage-del{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,107,107,0.2);background:transparent;color:var(--error);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;opacity:0.7;}
.manage-handle{width:32px;height:36px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.18);font-size:16px;flex-shrink:0;cursor:grab;touch-action:none;}
.manage-ghost{position:fixed;pointer-events:none;z-index:9999;background:#1a1a2e;border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.6);opacity:0.92;left:0;width:calc(100% - 32px);max-width:568px;}
.btn-add-pill{flex-shrink:0;padding:7px 14px;border-radius:var(--r50);background:transparent;border:1px dashed rgba(255,255,255,0.18);color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;min-height:36px;display:flex;align-items:center;gap:5px;touch-action:manipulation;}
.btn-add-pill:active{border-color:var(--accent);color:var(--accent);}
.btn-edit-pill{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-edit-pill:active{border-color:var(--accent);color:var(--accent);}

/* ── Player — full remaining height ── */
.player-card{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:24px 24px 28px;overflow:hidden;touch-action:pan-y;}
.swipe-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:22px;opacity:0;transition:opacity 0.15s;pointer-events:none;color:rgba(255,255,255,0.3);}
.swipe-hint.left{left:8px;}.swipe-hint.right{right:8px;}

/* ── Logo + visualizer area ── */
.logo-area{display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;gap:0;}
.logo-ring{width:180px;height:180px;border-radius:50%;background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;position:relative;transition:border-color 0.5s,box-shadow 0.5s;cursor:pointer;overflow:visible;}
.logo-ring.playing{border-color:rgba(255,255,255,0.0);box-shadow:0 0 60px rgba(0,0,0,0.6);}
.logo-ring::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--accent);border-right-color:rgba(255,255,255,0.12);opacity:0;transition:opacity 0.5s;}
.logo-ring.playing::after{opacity:1;animation:spin 3s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.art-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;opacity:0;transition:opacity 0.8s;clip-path:circle(50%);}
.art-img.visible{opacity:1;}
.logo-inner{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}
.logo-letter{font-size:60px;font-weight:900;line-height:1;letter-spacing:-3px;color:var(--accent);transition:color 0.5s;}
.viz-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;pointer-events:none;opacity:0;transition:opacity 0.8s;z-index:2;}
.viz-canvas.active{opacity:1;}
.viz-dots{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);display:flex;gap:6px;opacity:0;transition:opacity 0.4s;}
.logo-ring.playing .viz-dots{opacity:1;}
.viz-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.2s,transform 0.2s;}
.viz-dot.active{background:var(--accent);transform:scale(1.4);}

/* ── Station info ── */
.station-info{text-align:center;margin-top:32px;width:100%;}
.station-name{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--text);margin-bottom:4px;}
.station-meta{font-size:12px;color:var(--muted);letter-spacing:0.3px;}

/* ── Metadata card ── */
.meta-card{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px 16px;margin-top:20px;display:none;flex-direction:column;gap:10px;}
.meta-card.visible{display:flex;}
.now-playing-row{display:flex;align-items:center;gap:10px;}
.np-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.np-track{font-size:13px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.np-track.idle{color:var(--muted);font-weight:400;}
.meta-divider{height:1px;background:rgba(255,255,255,0.06);}
.schedule-row{display:flex;gap:12px;}
.sched-item{flex:1;min-width:0;}
.sched-label{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.sched-title{font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sched-time{font-size:11px;color:var(--muted);margin-top:1px;}
.meta-tags{display:flex;gap:6px;flex-wrap:wrap;}
.meta-tag{font-size:10px;padding:3px 8px;border-radius:var(--r50);background:rgba(255,255,255,0.06);color:var(--muted);letter-spacing:0.3px;}
.meta-tag.live{background:rgba(105,240,174,0.1);color:var(--success);}

/* ── Controls ── */
.controls-area{width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:24px;}
.controls-row{display:flex;align-items:center;justify-content:center;gap:24px;}
.btn-icon{width:44px;height:44px;border-radius:50%;background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.15s;flex-shrink:0;}
.btn-icon:active{background:rgba(255,255,255,0.06);transform:scale(0.92);}
.btn-icon.active{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,0.08);}
.btn-play{width:68px;height:68px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.1s,background 0.3s,box-shadow 0.3s;box-shadow:0 6px 28px rgba(0,0,0,0.5);-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-play:active{transform:scale(0.90);}
.btn-play.playing{background:rgba(255,255,255,0.08);border:1.5px solid var(--accent);box-shadow:0 0 0 6px rgba(79,195,247,0.08);}
.btn-play svg{display:block;}
.btn-play .icon-play{display:block;}.btn-play .icon-stop{display:none;}
.btn-play.playing .icon-play{display:none;}.btn-play.playing .icon-stop{display:block;}
.vol-row{display:flex;align-items:center;gap:12px;width:100%;}
.vol-icon{font-size:14px;color:rgba(255,255,255,0.3);}
.vol-slider{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.1);outline:none;cursor:pointer;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(0,0,0,0.4);}

/* ── Status ── */
.status-row{display:flex;align-items:center;justify-content:center;gap:10px;}
.status-chip{font-size:11px;padding:3px 10px;border-radius:var(--r50);background:rgba(255,255,255,0.05);color:var(--muted);transition:all 0.3s;letter-spacing:0.3px;}
.status-chip.live{background:rgba(105,240,174,0.1);color:var(--success);}
.status-chip.error{background:rgba(255,107,107,0.1);color:var(--error);}
.listen-time{font-size:11px;color:var(--muted);display:none;}
.listen-time.visible{display:block;}

/* ── Empty state ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px 32px;text-align:center;}
.empty-icon{font-size:56px;opacity:0.3;}
.empty-title{font-size:18px;font-weight:700;color:var(--text);}
.empty-desc{font-size:13px;color:var(--muted);line-height:1.6;max-width:280px;}
.btn-primary{padding:13px 32px;border-radius:var(--r50);background:transparent;border:1.5px solid var(--accent);color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background 0.15s;}
.btn-primary:active{background:rgba(79,195,247,0.1);}

/* ── Sheet overlay ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.sheet-overlay.visible{display:flex;}
.sheet{width:100%;max-width:600px;background:#0f0f22;border-radius:28px 28px 0 0;padding:0 0 40px;max-height:88vh;display:flex;flex-direction:column;border-top:1px solid rgba(255,255,255,0.07);}
.sheet-handle-wrap{padding:14px 0 4px;display:flex;justify-content:center;flex-shrink:0;}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);}
.sheet-header{padding:4px 20px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.05);}
.sheet-title{font-size:15px;font-weight:700;color:var(--text);}
.sheet-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.sheet-body{flex:1;overflow-y:auto;padding:20px 20px 0;}
.sheet-body::-webkit-scrollbar{width:3px;}
.sheet-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}

/* ── Search sheet ── */
.search-row{display:flex;gap:10px;margin-bottom:14px;}
.search-input{flex:1;padding:11px 14px;border-radius:var(--r12);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;}
.search-input:focus{border-color:var(--accent);}
.btn-search{padding:11px 18px;border-radius:var(--r12);background:var(--accent);border:none;color:#0d0d1a;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap;}
.btn-search:active{opacity:0.8;}
.search-results{display:flex;flex-direction:column;gap:8px;padding-bottom:8px;}
.result-item{display:flex;align-items:center;gap:12px;padding:11px 13px;background:rgba(255,255,255,0.03);border-radius:14px;border:1px solid rgba(255,255,255,0.05);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:border-color 0.15s;}
.result-item:active{border-color:var(--accent);}
.result-item.flv-unsupported{opacity:0.4;}
.result-favicon{width:36px;height:36px;border-radius:10px;object-fit:cover;background:#1a1a2e;flex-shrink:0;}
.result-favicon-fallback{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.result-info{flex:1;min-width:0;}
.result-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-meta{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-add{width:30px;height:30px;border-radius:50%;background:rgba(79,195,247,0.08);border:1px solid rgba(79,195,247,0.25);color:var(--accent);font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.result-added-badge{font-size:12px;color:var(--success);flex-shrink:0;}
.search-status{font-size:13px;color:var(--muted);text-align:center;padding:28px 0;}
.result-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn-preview{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.15s;}
.btn-preview.previewing{background:rgba(105,240,174,0.08);border-color:var(--success);color:var(--success);}
.btn-preview.loading{animation:spin 1s linear infinite;border-top-color:var(--accent);border-color:rgba(255,255,255,0.08);}

/* ── Timers sheet ── */
.timers-body{display:flex;flex-direction:column;gap:24px;}
.ts-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.timer-btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.timer-btn{padding:10px 16px;border-radius:var(--r50);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;min-height:44px;display:flex;align-items:center;touch-action:manipulation;}
.timer-btn.active{background:rgba(79,195,247,0.08);color:var(--accent);border-color:var(--accent);}
.timer-status{font-size:12px;color:var(--accent);display:none;align-items:center;gap:8px;margin-top:10px;padding:10px 14px;background:rgba(79,195,247,0.05);border-radius:12px;border:1px solid rgba(79,195,247,0.12);}
.timer-status.visible{display:flex;}
.wake-row{display:flex;align-items:center;gap:10px;}
.wake-input{flex:1;padding:12px 14px;border-radius:var(--r12);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:15px;-webkit-appearance:none;min-height:48px;}
.wake-set-btn{padding:12px 20px;border-radius:var(--r12);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--muted);font-size:13px;cursor:pointer;min-height:48px;transition:all 0.15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;touch-action:manipulation;}
.wake-set-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(79,195,247,0.07);}
.wake-status-msg{font-size:12px;color:var(--accent);display:none;margin-top:10px;padding:10px 14px;background:rgba(79,195,247,0.05);border-radius:12px;border:1px solid rgba(79,195,247,0.12);}
.wake-status-msg.visible{display:block;}

/* ── Settings sheet ── */
.settings-body{display:flex;flex-direction:column;gap:4px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.setting-row:last-child{border-bottom:none;}
.setting-info{flex:1;}
.setting-name{font-size:14px;color:var(--text);margin-bottom:2px;}
.setting-desc{font-size:12px;color:var(--muted);}
.toggle{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.08);flex-shrink:0;position:relative;transition:all 0.2s;}
.toggle.on{background:var(--accent);border-color:var(--accent);}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.35);}
.toggle.on .toggle-knob{transform:translateX(18px);}
/* ── Lang picker ── */
.lang-picker{display:flex;gap:6px;}
.lang-btn{padding:6px 14px;border-radius:var(--r50);border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;min-height:36px;}
.lang-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,0.08);}
</style>

<div class="loading-bar" id="loadingBar"></div>
<div class="bg-glow stopped" id="bgGlow"></div>

<!-- Search sheet -->
<div class="sheet-overlay" id="searchOverlay" onclick="handleSheetClick(event,'searchOverlay',closeSearch)">
  <div class="sheet">
    <div class="sheet-handle-wrap"><div class="sheet-handle"></div></div>
    <div class="sheet-header">
      <div class="sheet-title" data-i18n="addStation"></div>
      <button class="sheet-close" onclick="closeSearch()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="search-row" style="margin-top:14px;">
        <input class="search-input" id="searchInput" type="search" data-i18n-ph="searchPlaceholder" autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn-search" onclick="doSearch()" data-i18n="search"></button>
      </div>
      <div id="searchResults" class="search-results">

function T(key,vars){
  var s=(STRINGS[LANG]||STRINGS.en)[key]||(STRINGS.en[key]||key);
  if(vars)Object.keys(vars).forEach(function(k){s=s.replace('{'+k+'}',vars[k]);});
  return s;
}

function setLang(lang){
  LANG=lang;
  try{iappyx.save('radio_lang',lang);}catch(e){}
  // Update lang buttons
  ['en','nl','fy'].forEach(function(l){
    var btn=document.getElementById('lang'+l.toUpperCase().replace('FY','FY'));
    if(btn)btn.classList.toggle('active',l===lang);
  });
  // Render all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent=T(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el){
    el.placeholder=T(el.getAttribute('data-i18n-ph'));
  });
  // Re-render dynamic elements
  buildStationBar();
  if(document.getElementById('manageOverlay').classList.contains('visible'))buildManageList();
  // Wake button text
  var wb=document.getElementById('wakeBtn');
  if(wb)wb.textContent=wakeActive?T('cancel'):T('set');
  // Status chip — re-apply current status
  if(appPlaying)setStatus(T('statusLive'),'live');
  else setStatus(T('statusStopped'),'');
  // Update search hint if results are showing the initial hint
  var sr=document.getElementById('searchResults');
  if(sr){var sh=sr.querySelector('[data-i18n="searchHint"]');if(sh)sh.textContent=T('searchHint');}
}

function _initBridge(){if(typeof iappyx==='undefined'){setTimeout(_initBridge,50);return;}onReady();}
window.addEventListener('load',function(){setTimeout(_initBridge,200);});

function onReady(){
  var saved=iappyx.load('radio_stations');
  if(saved){try{STATIONS=JSON.parse(saved)||[];}catch(e){STATIONS=[];}}
  // Normalise legacy stations that have no pinned/lastPlayed fields
  STATIONS.forEach(function(s,i){if(s.pinned===undefined)s.pinned=false;if(s.lastPlayed===undefined)s.lastPlayed=0;});
  sortStations();
  var v=iappyx.load('radio_vol');if(v!==null){appVolume=parseInt(v)||85;document.getElementById('volSlider').value=appVolume;}
  var si=iappyx.load('radio_station');if(si!==null){var idx=parseInt(si)||0;if(idx>=0&&idx<STATIONS.length)currentStationIdx=idx;}
  var se=iappyx.load('radio_sleep_end');if(se){var ends=parseInt(se)||0;if(ends>Date.now()+5000){sleepTimerEnd=ends;startSleepCountdown();}else iappyx.remove('radio_sleep_end');}
  var wk=iappyx.load('radio_wake');
  if(wk){wakeTimeStr=wk;wakeActive=true;document.getElementById('wakeInput').value=wk;document.getElementById('wakeBtn').textContent=T('cancel');document.getElementById('wakeBtn').classList.add('active');showWakeStatus();startWakeCheck();}
  var vm=iappyx.load('radio_vizmode');if(vm!==null)vizMode=parseInt(vm)||0;
  var lg=iappyx.load('radio_lang');LANG=lg||'en';
  renderAll();initSwipe();
  var sh=iappyx.load('radio_shake');shakeEnabled=(sh==='1');applyShakeSetting();if(shakeEnabled)initShake();
  updateTimersBadge();
  setLang(LANG);
}
function saveStations(){iappyx.save('radio_stations',JSON.stringify(STATIONS));}

function renderAll(){
  var has=STATIONS.length>0;
  document.getElementById('emptyState').style.display=has?'none':'flex';
  document.getElementById('playerCard').style.display=has?'flex':'none';
  buildStationBar();
  if(has){
    if(currentStationIdx>=STATIONS.length)currentStationIdx=0;
    applyStation(currentStationIdx,false);buildVizDots();
    requestAnimationFrame(function(){requestAnimationFrame(function(){buildVisualizer();});});
  }
}

// ── Station ordering ──────────────────────────────────────────────────────────
function sortStations(){
  var pinned=[],unpinned=[];
  STATIONS.forEach(function(s){if(s.pinned)pinned.push(s);else unpinned.push(s);});
  unpinned.sort(function(a,b){return (b.lastPlayed||0)-(a.lastPlayed||0);});
  STATIONS=pinned.concat(unpinned);
}

function buildStationBar(){
  var bar=document.getElementById('stationBar');bar.innerHTML='';
  bar.className='station-bar';
  STATIONS.forEach(function(s,idx){
    var btn=document.createElement('button');
    btn.className='station-pill'+(idx===currentStationIdx?' active':'');
    if(idx===currentStationIdx)btn.style.borderColor=s.color;
    if(s.pinned){var dot=document.createElement('span');dot.className='pin-dot';btn.appendChild(dot);}
    btn.appendChild(document.createTextNode(s.label||s.name));
    btn.onclick=function(){selectStation(idx);};
    bar.appendChild(btn);
  });
  var addBtn=document.createElement('button');addBtn.className='btn-add-pill';
  addBtn.innerHTML='<span style="font-size:15px;line-height:1">+</span><span>'+T('addPill')+'</span>';addBtn.onclick=openSearch;bar.appendChild(addBtn);
  if(STATIONS.length>0){
    var eb=document.createElement('button');eb.className='btn-edit-pill';
    eb.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    eb.onclick=openManage;bar.appendChild(eb);
  }
}

function removeStation(idx){
  var wasPlaying=appPlaying&&idx===currentStationIdx;if(wasPlaying)stopStream();
  STATIONS.splice(idx,1);saveStations();
  if(currentStationIdx>=STATIONS.length)currentStationIdx=Math.max(0,STATIONS.length-1);
  iappyx.save('radio_station',String(currentStationIdx));
  renderAll();buildManageList();
}
function addStation(station){
  var color=COLOR_POOL[STATIONS.length%COLOR_POOL.length];
  var label=station.name.length>13?station.name.substring(0,13).trim()+'…':station.name;
  STATIONS.push({id:station.stationuuid||('s'+Date.now()),name:station.name,label:label,stream:station.url_resolved||station.url,favicon:station.favicon||'',country:station.country||'',tags:station.tags||'',codec:station.codec||'',color:color,pinned:false,lastPlayed:Date.now()});
  sortStations();saveStations();
  // Select the new station (it's the first unpinned = right after pinned block)
  var pinnedCount=0;STATIONS.forEach(function(s){if(s.pinned)pinnedCount++;});
  currentStationIdx=pinnedCount>0?pinnedCount:0;
  // Actually find it by most recent lastPlayed among unpinned
  for(var i=0;i<STATIONS.length;i++){if(!STATIONS[i].pinned){currentStationIdx=i;break;}}
  iappyx.save('radio_station',String(currentStationIdx));
  renderAll();try{iappyx.vibration.tick();}catch(e){}
}

// ── Manage sheet ──────────────────────────────────────────────────────────────
var manageDragIdx=null,manageDragGhost=null;

function openManage(){
  buildManageList();
  document.getElementById('manageOverlay').classList.add('visible');
}
function closeManage(){
  document.getElementById('manageOverlay').classList.remove('visible');
}

function buildManageList(){
  var el=document.getElementById('manageList');if(!el)return;
  el.innerHTML='';
  if(!STATIONS.length){el.innerHTML='<div style="padding:24px 0;text-align:center;color:var(--muted);font-size:13px;">'+T('noStationsManage')+'</div>';return;}

  var pinnedCount=0;STATIONS.forEach(function(s){if(s.pinned)pinnedCount++;});

  if(pinnedCount>0){
    var ph=document.createElement('div');ph.className='manage-section-header';
    ph.innerHTML='<span>'+T('pinnedHeader')+'</span>';el.appendChild(ph);
  }

  STATIONS.forEach(function(s,idx){
    if(idx===pinnedCount){
      var uh=document.createElement('div');uh.className='manage-section-header';
      uh.innerHTML='<span>'+T('recentHeader')+'</span>';el.appendChild(uh);
    }

    var row=document.createElement('div');row.className='manage-row';row.dataset.idx=idx;

    // Favicon / letter
    var fav=document.createElement('div');fav.className='manage-favicon-fb';
    fav.style.color=s.color;fav.style.fontSize='18px';fav.style.fontWeight='900';
    if(s.favicon){
      var img=document.createElement('img');img.className='manage-favicon';img.src=s.favicon;img.alt='';
      img.onerror=function(){img.style.display='none';fav.style.display='flex';fav.textContent=s.name.charAt(0).toUpperCase();};
      fav.style.display='none';row.appendChild(img);
    } else {fav.textContent=s.name.charAt(0).toUpperCase();}
    row.appendChild(fav);

    // Info
    var info=document.createElement('div');info.className='manage-info';
    var nm=document.createElement('div');nm.className='manage-name';nm.textContent=s.name;
    var mt=document.createElement('div');mt.className='manage-meta';
    var mp=[];if(s.country)mp.push(s.country);if(s.codec)mp.push(s.codec.toUpperCase());
    mt.textContent=mp.join(' · ')||(s.tags?s.tags.split(',')[0].trim():'');
    info.appendChild(nm);info.appendChild(mt);row.appendChild(info);

    // Pin toggle
    var pb=document.createElement('button');pb.className='manage-pin'+(s.pinned?' on':'');
    pb.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="'+(s.pinned?'currentColor':'none')+'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
    pb.title=s.pinned?T('unpinTitle'):T('pinTitle');
    (function(i){pb.onclick=function(){togglePin(i);};})(idx);
    row.appendChild(pb);

    // Delete

    (function(i){db.onclick=function(){removeStation(i);};})(idx);
    row.appendChild(db);

    // Drag handle

    dh.setAttribute('touch-action','none');

    row.appendChild(dh);

    el.appendChild(row);
  });
}

function togglePin(idx){
  var curId=STATIONS[currentStationIdx]?STATIONS[currentStationIdx].id:null;
  STATIONS[idx].pinned=!STATIONS[idx].pinned;
  sortStations();
  if(curId){for(var i=0;i<STATIONS.length;i++){if(STATIONS[i].id===curId){currentStationIdx=i;break;}}}
  saveStations();iappyx.save('radio_station',String(currentStationIdx));
  buildStationBar();buildManageList();
  try{iappyx.vibration.tick();}catch(e){}

// ── Vertical drag in manage sheet ─────────────────────────────────────────────
function startManageDrag(e,idx){
  manageDragIdx=idx;
  var listEl=document.getElementById('manageList');
  var rows=listEl.querySelectorAll('.manage-row');
  var srcRow=rows[idx];
  var srcRect=srcRow.getBoundingClientRect();
  var touch=e.touches[0];
  var offsetY=touch.clientY-srcRect.top;

  srcRow.classList.add('dragging');

  // Ghost
  manageDragGhost=document.createElement('div');
  manageDragGhost.className='manage-ghost';
  manageDragGhost.style.top=(touch.clientY-offsetY)+'px';
  manageDragGhost.innerHTML=srcRow.innerHTML;
  manageDragGhost.style.width=srcRect.width+'px';
  document.body.appendChild(manageDragGhost);

  var lastTarget=null;

  function onMove(ev){
    var t=ev.touches[0];
    manageDragGhost.style.top=(t.clientY-offsetY)+'px';
    // Find which row the centre of the ghost is over
    var ghostMid=t.clientY-offsetY+srcRect.height/2;
    var rows2=listEl.querySelectorAll('.manage-row');
    var target=null,bestDist=Infinity;
    rows2.forEach(function(r,i){
      if(i===manageDragIdx)return;
      var rr=r.getBoundingClientRect();
      var mid=rr.top+rr.height/2;
      var dist=Math.abs(ghostMid-mid);
      if(dist<bestDist){bestDist=dist;target=i;}
    });
    if(target!==lastTarget){
      rows2.forEach(function(r){r.classList.remove('drag-above','drag-below');});
      if(target!==null){
        var tRect=rows2[target].getBoundingClientRect();
        var tMid=tRect.top+tRect.height/2;
        rows2[target].classList.add(ghostMid<tMid?'drag-above':'drag-below');
      }
      lastTarget=target;
    }
    ev.preventDefault();
  }

  function onEnd(ev){
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    if(manageDragGhost){manageDragGhost.remove();manageDragGhost=null;}
    var rows2=listEl.querySelectorAll('.manage-row');
    rows2.forEach(function(r){r.classList.remove('dragging','drag-above','drag-below');});

    if(lastTarget!==null&&lastTarget!==manageDragIdx){
      var curId=STATIONS[currentStationIdx]?STATIONS[currentStationIdx].id:null;
      var moved=STATIONS.splice(manageDragIdx,1)[0];
      var insertAt=lastTarget>manageDragIdx?lastTarget:lastTarget;
      STATIONS.splice(insertAt,0,moved);
      // Determine pinned status by neighbours at new position
      var prevPin=insertAt>0&&!!STATIONS[insertAt-1].pinned;
      var nextPin=insertAt<STATIONS.length-1&&!!STATIONS[insertAt+1].pinned;
      // If dropped between two pinned, or before first unpinned: pin it.
      // If dropped into unpinned zone: unpin it.
      moved.pinned=prevPin||(insertAt===0&&STATIONS.length>1&&!!STATIONS[1].pinned);
      // Re-sort unpinned by recency (pinned stay in manual order)
      var pinned=[],unpinned=[];
      STATIONS.forEach(function(s){if(s.pinned)pinned.push(s);else unpinned.push(s);});
      unpinned.sort(function(a,b){return (b.lastPlayed||0)-(a.lastPlayed||0);});
      STATIONS=pinned.concat(unpinned);
      if(curId){for(var i=0;i<STATIONS.length;i++){if(STATIONS[i].id===curId){currentStationIdx=i;break;}}}
      saveStations();iappyx.save('radio_station',String(currentStationIdx));
      buildStationBar();buildManageList();
      try{iappyx.vibration.tick();}catch(e){}
    }
    manageDragIdx=null;
  }

  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd,{passive:true});
}

function applyStation(idx,autoPlay){
  var s=STATIONS[idx];if(!s)return;
  document.documentElement.style.setProperty('--accent',s.color);
  var logoEl=document.getElementById('logoDisplay'),artImg=document.getElementById('artImg');
  artImg.classList.remove('visible');artImg.src='';
  if(s.favicon){
    artImg.onload=function(){artImg.classList.add('visible');logoEl.style.display='none';};
    artImg.onerror=function(){artImg.classList.remove('visible');logoEl.style.display='';setLogoLetter(s);};
    artImg.src=s.favicon;
  } else {setLogoLetter(s);logoEl.style.display='';}
  document.getElementById('stationTitle').textContent=s.name;
  var dp=[];
  if(s.country)dp.push(s.country);
  if(s.tags){var tgs=s.tags.split(',').slice(0,2).map(function(t){return t.trim();}).filter(Boolean);if(tgs.length)dp.push(tgs.join(' · '));}
  document.getElementById('stationDesc').textContent=dp.join(' — ');
  // Build metadata tags
  var tagsEl=document.getElementById('metaTags');tagsEl.innerHTML='';
  if(s.codec){var ct=document.createElement('span');ct.className='meta-tag';ct.textContent=s.codec.toUpperCase();tagsEl.appendChild(ct);}
  if(s.country){var co=document.createElement('span');co.className='meta-tag';co.textContent=s.country;tagsEl.appendChild(co);}
  if(s.tags){var st=s.tags.split(',').slice(0,3).map(function(t){return t.trim();}).filter(Boolean);st.forEach(function(t){var tg=document.createElement('span');tg.className='meta-tag';tg.textContent=t;tagsEl.appendChild(tg);});}
  setNowPlaying('');clearSchedule();setStatus(T('statusReady'),'');
  if(autoPlay)startStream();
}
function setLogoLetter(s){var el=document.getElementById('logoDisplay');el.className='logo-letter';el.style.color=s.color;el.textContent=s.name.charAt(0).toUpperCase();}

function selectStation(idx){
  if(idx===currentStationIdx&&!appPlaying)return;
  var was=appPlaying;if(appPlaying)stopStream();
  if(metaIntervalId){clearInterval(metaIntervalId);metaIntervalId=null;}
  // Record last played on the station being selected
  STATIONS[idx].lastPlayed=Date.now();
  currentStationIdx=idx;
  // Re-sort unpinned section so most-recently-played floats up,
  // but preserve the selected station's position by finding it after sort.
  var selectedId=STATIONS[idx].id;
  sortStations();
  for(var i=0;i<STATIONS.length;i++){if(STATIONS[i].id===selectedId){currentStationIdx=i;break;}}
  saveStations();iappyx.save('radio_station',String(currentStationIdx));
  applyStation(currentStationIdx,was);buildStationBar();
}

function initSwipe(){

var lastShakeMs=0;
function initShake(){if(typeof iappyx==='undefined')return;try{iappyx.sensor.startAccelerometer('window.onShakeAccel');}catch(e){}}

// ── Visualizer ────────────────────────────────────────────────────────────────
var vizCanvas=null,vizCtx=null,vizFftData=null,vizWaveData=null,vizRafId=null;
var vizSmoothVals=null,vizPeak=1,vizFallbackH=[];
var vizMode=0,VIZ_MODES=4,NUM_BARS=64;

function buildVizDots(){
  var el=document.getElementById('vizDots');el.innerHTML='';
  for(var i=0;i<VIZ_MODES;i++){var d=document.createElement('div');d.className='viz-dot'+(i===vizMode?' active':'');el.appendChild(d);}
}
function cycleVizMode(){
  vizMode=(vizMode+1)%VIZ_MODES;iappyx.save('radio_vizmode',String(vizMode));buildVizDots();
  try{iappyx.vibration.tick();}catch(e){}
}
function buildVisualizer(){
  vizCanvas=document.getElementById('visualizer');
  if(!vizCanvas.offsetWidth){requestAnimationFrame(buildVisualizer);return;}
  var dpr=window.devicePixelRatio||1,sz=vizCanvas.offsetWidth;
  vizCanvas.width=sz*dpr;vizCanvas.height=sz*dpr;
  vizCtx=vizCanvas.getContext('2d');vizCtx.scale(dpr,dpr);
  vizSmoothVals=new Array(NUM_BARS).fill(0);vizPeak=1;
  vizFallbackH=[];for(var i=0;i<NUM_BARS;i++)vizFallbackH.push(Math.random()*0.3+0.05);
}
window.onViz=function(data){
  var d=typeof data==='string'?JSON.parse(data):data;
  if(d.fft)vizFftData=d.fft;if(d.waveform)vizWaveData=d.waveform;
};
function getVals(){
  var n=NUM_BARS,raw=new Array(n);
  if(vizFftData&&vizFftData.length>=4){
    var mags=[],fp=0;
    for(var i=1;i<=63;i++){
      var re=Number(vizFftData[i*2]||0);if(re>127)re-=256;
      var im=Number(vizFftData[i*2+1]||0);if(im>127)im-=256;
      var mag=Math.sqrt(re*re+im*im);mags.push(mag);if(mag>fp)fp=mag;
    }
    if(fp>vizPeak)vizPeak=fp;else vizPeak=vizPeak*0.97+fp*0.03;if(vizPeak<1)vizPeak=1;
    var ub=Math.ceil(mags.length*0.6);
    for(var i=0;i<n;i++){var lin=mags[Math.floor(i/n*ub)]/vizPeak;lin=Math.max(0,(lin-0.05)/0.95);raw[i]=Math.log1p(lin*9)/Math.log1p(9);}
  } else if(vizWaveData&&vizWaveData.length){
    var step=Math.max(1,Math.floor(vizWaveData.length/n));
    for(var i=0;i<n;i++)raw[i]=Math.abs((Number(vizWaveData[i*step]||128)-128)/128);
  } else {
    for(var i=0;i<n;i++){vizFallbackH[i]+=(Math.random()-0.5)*0.06;vizFallbackH[i]=Math.max(0.04,Math.min(0.7,vizFallbackH[i]));raw[i]=vizFallbackH[i];}
  }
  for(var i=0;i<n;i++){
    if(raw[i]>vizSmoothVals[i])vizSmoothVals[i]=vizSmoothVals[i]*0.4+raw[i]*0.6;
    else vizSmoothVals[i]=vizSmoothVals[i]*0.85+raw[i]*0.15;
  }
  return vizSmoothVals;
}
function getWave(){
  var n=NUM_BARS,wave=new Array(n).fill(0.5);
  if(vizWaveData&&vizWaveData.length){var step=Math.max(1,Math.floor(vizWaveData.length/n));for(var i=0;i<n;i++)wave[i]=Number(vizWaveData[i*step]||128)/255;}
  else{for(var i=0;i<n;i++)wave[i]=0.5+(vizFallbackH[i]||0.1)*Math.sin(Date.now()/500+i*0.25)*0.5;}
  return wave;
}
function hexToRgba(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}

function drawViz(){
  if(!vizCtx)return;
  var sz=vizCanvas.offsetWidth||260;vizCtx.clearRect(0,0,sz,sz);
  var s=STATIONS[currentStationIdx],col=s?s.color:'#4FC3F7';
  if(vizMode===0)drawRadial(sz,col);
  else if(vizMode===1)drawFreqBars(sz,col);
  else if(vizMode===2)drawHorizWave(sz,col);
  else drawBloom(sz,col);
}
function drawRadial(sz,col){
  var vals=getVals(),cx=sz/2,cy=sz/2,n=NUM_BARS;
  var ir=sz/2*0.70,ml=sz/2*0.28;
  var lw=Math.max(1.5,(Math.PI*2*ir/n)*0.50);
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2,v=vals[i],bl=Math.max(1,v*ml);
    vizCtx.strokeStyle=hexToRgba(col,0.12+v*0.88);vizCtx.lineWidth=lw;vizCtx.lineCap='round';
    vizCtx.beginPath();vizCtx.moveTo(cx+Math.cos(a)*ir,cy+Math.sin(a)*ir);vizCtx.lineTo(cx+Math.cos(a)*(ir+bl),cy+Math.sin(a)*(ir+bl));vizCtx.stroke();
  }
}
// Mode 1 — vertical frequency bars, mirrored top+bottom, with glow
function drawFreqBars(sz,col){
  var vals=getVals(),n=NUM_BARS;
  var pad=sz*0.04,bw=(sz-pad*2)/n,gap=Math.max(1,bw*0.18);
  var cy=sz/2,maxH=sz*0.44;
  var grad=vizCtx.createLinearGradient(0,cy-maxH,0,cy);
  grad.addColorStop(0,hexToRgba(col,0.95));
  grad.addColorStop(0.5,hexToRgba(col,0.55));
  grad.addColorStop(1,hexToRgba(col,0.15));
  var gradB=vizCtx.createLinearGradient(0,cy,0,cy+maxH);
  gradB.addColorStop(0,hexToRgba(col,0.15));
  gradB.addColorStop(1,hexToRgba(col,0.04));
  for(var i=0;i<n;i++){
    var x=pad+i*bw,v=vals[i],h=Math.max(2,v*maxH),w=bw-gap;
    // top bar
    vizCtx.fillStyle=grad;
    vizCtx.beginPath();
    var r=Math.min(w/2,3);
    var bx=x+gap/2,by=cy-h;
    vizCtx.moveTo(bx+r,by);vizCtx.lineTo(bx+w-r,by);
    vizCtx.arcTo(bx+w,by,bx+w,by+r,r);
    vizCtx.lineTo(bx+w,cy);vizCtx.lineTo(bx,cy);
    vizCtx.arcTo(bx,by,bx+r,by,r);vizCtx.closePath();
    vizCtx.fill();
    // bottom mirror (dimmer)
    vizCtx.fillStyle=gradB;
    vizCtx.fillRect(bx,cy,w,Math.max(1,h*0.35));
    // peak dot
    if(v>0.15){vizCtx.fillStyle=hexToRgba(col,0.9);vizCtx.fillRect(bx,cy-h-3,w,2);}
  }
}
// Mode 2 — smooth horizontal waveform, dual mirror, filled under curve
function drawHorizWave(sz,col){
  var wave=getWave(),n=wave.length;
  var cy=sz/2,amp=sz*0.36,step=sz/(n-1);
  // filled area under top wave
  vizCtx.beginPath();
  vizCtx.moveTo(0,cy);
  for(var i=0;i<n;i++){
    var x=i*step,y=cy-(wave[i]-0.5)*2*amp;
    if(i===0)vizCtx.lineTo(x,y);
    else{var px=(i-0.5)*step;vizCtx.quadraticCurveTo(px,cy-(wave[i-1]-0.5)*2*amp-(wave[i]-0.5)*2*amp>0?0:0,x,y);}
  }
  vizCtx.lineTo(sz,cy);vizCtx.closePath();
  var fg=vizCtx.createLinearGradient(0,cy-amp,0,cy);
  fg.addColorStop(0,hexToRgba(col,0.28));fg.addColorStop(1,hexToRgba(col,0.02));
  vizCtx.fillStyle=fg;vizCtx.fill();
  // top stroke
  vizCtx.beginPath();
  for(var i=0;i<n;i++){
    var x=i*step,y=cy-(wave[i]-0.5)*2*amp;
    if(i===0)vizCtx.moveTo(x,y);
    else{var cpx=(i-0.5)*step,cpy=cy-(wave[i-1]-0.5)*2*amp;vizCtx.quadraticCurveTo(cpx,cpy,x,y);}
  }
  vizCtx.strokeStyle=hexToRgba(col,0.9);vizCtx.lineWidth=2;vizCtx.lineJoin='round';vizCtx.stroke();
  // mirrored bottom stroke (dimmer)
  vizCtx.beginPath();
  for(var i=0;i<n;i++){
    var x=i*step,y=cy+(wave[i]-0.5)*2*amp*0.45;
    if(i===0)vizCtx.moveTo(x,y);
    else{var cpx=(i-0.5)*step,cpy=cy+(wave[i-1]-0.5)*2*amp*0.45;vizCtx.quadraticCurveTo(cpx,cpy,x,y);}
  }
  vizCtx.strokeStyle=hexToRgba(col,0.25);vizCtx.lineWidth=1.5;vizCtx.stroke();
  // centre line
  vizCtx.strokeStyle=hexToRgba(col,0.1);vizCtx.lineWidth=1;
  vizCtx.beginPath();vizCtx.moveTo(0,cy);vizCtx.lineTo(sz,cy);vizCtx.stroke();
}
function drawBloom(sz,col){
  var vals=getVals(),cx=sz/2,cy=sz/2,n=NUM_BARS;
  var rings=3;
  for(var ring=0;ring<rings;ring++){
    var rr=sz/2*(0.46+ring*0.14),rn=Math.floor(n/(ring+1)),ra=0.7-ring*0.2;
    for(var i=0;i<rn;i++){
      var a=(i/rn)*Math.PI*2-Math.PI/2+(ring*Math.PI*0.07),v=vals[Math.floor(i/rn*n)],dr=Math.max(1.5,v*sz*0.045+1.5);
      vizCtx.beginPath();vizCtx.arc(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr,dr,0,Math.PI*2);
      vizCtx.fillStyle=hexToRgba(col,ra*v+0.07);vizCtx.fill();
    }
  }
  var mv=0;for(var i=0;i<n;i++)mv+=vals[i];mv/=n;
  var pr=sz/2*0.42*mv;
  if(pr>1){var g=vizCtx.createRadialGradient(cx,cy,0,cx,cy,pr);g.addColorStop(0,hexToRgba(col,0.2*mv));g.addColorStop(1,hexToRgba(col,0));vizCtx.beginPath();vizCtx.arc(cx,cy,pr,0,Math.PI*2);vizCtx.fillStyle=g;vizCtx.fill();}
}
function startViz(){
  vizCanvas=document.getElementById('visualizer');vizFftData=null;vizWaveData=null;vizPeak=1;
  if(!vizCtx||!vizCanvas.width)buildVisualizer();
  if(vizSmoothVals)for(var i=0;i<vizSmoothVals.length;i++)vizSmoothVals[i]=0;
  vizCanvas.classList.add('active');
  if(vizRafId)cancelAnimationFrame(vizRafId);
  (function loop(){if(!vizCanvas||!vizCanvas.classList.contains('active'))return;vizRafId=requestAnimationFrame(loop);drawViz();})();
  // Poll until audio is actually playing before registering the visualizer.
  // Slow streams can take many seconds to buffer; firing startVisualizer too
  // early results in no FFT data ever arriving.
  var vizStartAttempts=0;
  function tryStartViz(){
    if(!vizCanvas||!vizCanvas.classList.contains('active'))return;
    try{
      var playing=false;try{playing=iappyx.audio.isPlaying();}catch(e){}
      if(playing){
        try{iappyx.audio.startVisualizer('window.onViz');}catch(e){}
        // If no real data arrives within 3s the audio engine may not have
        // opened its audio session yet — restart the visualizer once more.
        setTimeout(function(){
          if(!vizCanvas||!vizCanvas.classList.contains('active'))return;
          if(!vizFftData&&!vizWaveData){
            try{iappyx.audio.stopVisualizer();}catch(e){}
            try{iappyx.audio.startVisualizer('window.onViz');}catch(e){}
          }
        },3000);
      } else if(vizStartAttempts<30){
        vizStartAttempts++;
        setTimeout(tryStartViz,500);
      }
    }catch(e){}
  }
  setTimeout(tryStartViz,500);
}
function stopViz(){
  if(vizCanvas)vizCanvas.classList.remove('active');
  try{iappyx.audio.stopVisualizer();}catch(e){}
  if(vizRafId){cancelAnimationFrame(vizRafId);vizRafId=null;}
  vizFftData=null;vizWaveData=null;
  if(vizCtx&&vizCanvas)vizCtx.clearRect(0,0,vizCanvas.offsetWidth,vizCanvas.offsetWidth);
}

// ── Stream ────────────────────────────────────────────────────────────────────
function resolveStreamUrl(url,cb){
  var low=url.toLowerCase().split('?')[0];
  if(!low.endsWith('.m3u')&&!low.endsWith('.m3u8')&&!low.endsWith('.pls')){cb(url);return;}
  try{
    var id='pl_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    window._iappyxCb=window._iappyxCb||{};
    var t=setTimeout(function(){delete window._iappyxCb[id];cb(url);},8000);
    window._iappyxCb[id]=function(r){
      clearTimeout(t);if(!r.ok||!r.body){cb(url);return;}
      var lines=r.body.split(/\r?\n/);
      for(var i=0;i<lines.length;i++){var m=lines[i].match(/^File\d+=(.+)/i);if(m&&m[1].trim().match(/^https?:\/\//)){cb(m[1].trim());return;}}
      for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l&&!l.startsWith('#')&&l.match(/^https?:\/\//)){cb(l);return;}}
      cb(url);
    };
    iappyx.httpClient.request(JSON.stringify({url:url,method:'GET',timeout:8000,trustAllCerts:true}),id);
  }catch(e){
    fetch(url).then(function(r){return r.text();}).then(function(text){
      var lines=text.split(/\r?\n/);
      for(var i=0;i<lines.length;i++){var m=lines[i].match(/^File\d+=(.+)/i);if(m&&m[1].trim().match(/^https?:\/\//)){cb(m[1].trim());return;}}
      for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l&&!l.startsWith('#')&&l.match(/^https?:\/\//)){cb(l);return;}}
      cb(url);
    }).catch(function(){cb(url);});
  }
}
function tryPlay(url,onFail){
  try{iappyx.audio.play(url);iappyx.audio.setVolume(appVolume/100);}catch(e){
    if(url.match(/^http:\/\//i)){var u=url.replace(/^http:\/\//i,'https://');try{iappyx.audio.play(u);iappyx.audio.setVolume(appVolume/100);}catch(e2){if(onFail)onFail();}}
    else{if(onFail)onFail();}
  }
}
function togglePlay(){if(appPlaying)stopStream();else startStream();}
function startStream(){
  var s=STATIONS[currentStationIdx];if(!s)return;
  try{iappyx.audio.stop();}catch(e){}setStatus(T('statusLoading'),'');setLoading(true);
  resolveStreamUrl(s.stream,function(url){
    s.resolvedStream=url;var failed=false;
    tryPlay(url,function(){failed=true;setStatus(T('statusFailed'),'error');setLoading(false);});
    if(failed)return;
    try{iappyx.audio.setVolume(appVolume/100);}catch(e){}
    try{iappyx.audio.setMediaSession(JSON.stringify({title:s.name,artist:T('mediaArtist'),album:'Radio'}));}catch(e){}
    appPlaying=true;updateUI(true);setStatus(T('statusLive'),'live');setLoading(false);
    startViz();startMetaFetch();startListenTimer();
    try{iappyx.audio.requestFocus('window.onAudioFocus');}catch(e){}
  });
}
function stopStream(){
  try{iappyx.audio.pause();}catch(e){}try{iappyx.audio.stop();}catch(e){}
  appPlaying=false;updateUI(false);setStatus(T('statusStopped'),'');stopViz();setLoading(false);stopListenTimer();
  if(metaIntervalId){clearInterval(metaIntervalId);metaIntervalId=null;}
  setNowPlaying('');clearSchedule();
  try{iappyx.audio.abandonFocus();}catch(e){}
  if(STATIONS[currentStationIdx])try{iappyx.audio.setMediaSession(JSON.stringify({title:STATIONS[currentStationIdx].name,artist:T('mediaStopped'),album:'Radio'}));}catch(e){}
}
function scheduleReconnect(){
  if(reconnectCount>=5){setStatus(T('statusNoConn'),'error');return;}
  reconnectCount++;setStatus(T('statusReconnect',{n:reconnectCount}),'');
  reconnectTimer=setTimeout(function(){if(appPlaying){appPlaying=false;startStream();}},Math.min(5000*reconnectCount,30000));
}
function fadeAndStop(){
  if(!appPlaying||fadeIntervalId)return;
  var steps=60,step=0,sv=appVolume/100;setStatus(T('statusFading'),'');
  fadeIntervalId=setInterval(function(){
    step++;try{iappyx.audio.setVolume(Math.max(0,sv*(1-step/steps)));}catch(e){}
    if(step>=steps){clearInterval(fadeIntervalId);fadeIntervalId=null;try{iappyx.audio.setVolume(sv);}catch(e){}stopStream();}
  },500);
}

// ── Listen timer ──────────────────────────────────────────────────────────────
function startListenTimer(){
  listenStartMs=Date.now();document.getElementById('listenTime').classList.add('visible');
  if(listenIntervalId)clearInterval(listenIntervalId);
  listenIntervalId=setInterval(function(){
    var e=Math.floor((Date.now()-listenStartMs)/1000),h=Math.floor(e/3600),m=Math.floor((e%3600)/60),s=e%60;
    var txt=h>0?T('listenH',{h:h,m:m}):m>0?T('listenM',{m:m,s:s}):T('listenS',{s:s});
    document.getElementById('listenTime').textContent='⏱ '+txt;
  },1000);
}
function stopListenTimer(){if(listenIntervalId){clearInterval(listenIntervalId);listenIntervalId=null;}document.getElementById('listenTime').classList.remove('visible');}
function setVol(v){appVolume=parseInt(v);try{iappyx.audio.setVolume(appVolume/100);}catch(e){}iappyx.save('radio_vol',String(appVolume));}

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI(playing){
  var btn=document.getElementById('btnPlay'),ring=document.getElementById('logoRing');
  var glow=document.getElementById('bgGlow'),card=document.getElementById('playerCard');
  var s=STATIONS[currentStationIdx];
  if(playing){
    btn.classList.add('playing');ring.classList.add('playing');
    if(s)ring.style.borderColor='transparent';
    glow.className='bg-glow playing';card.classList.add('playing');
    document.getElementById('metaCard').classList.add('visible');
  } else {
    btn.classList.remove('playing');ring.classList.remove('playing');ring.style.borderColor='';
    glow.className='bg-glow stopped';card.classList.remove('playing');
    document.getElementById('metaCard').classList.remove('visible');
  }
}
function setStatus(msg,type){var c=document.getElementById('statusChip');c.textContent=msg;c.className='status-chip'+(type?' '+type:'');}
function setLoading(on){document.getElementById('loadingBar').className='loading-bar'+(on?' visible':'');}
function setNowPlaying(text){
  currentNowPlaying=text;
  var el=document.getElementById('npText'),s=STATIONS[currentStationIdx];
  var row=document.getElementById('npRow');
  if(text){
    el.textContent=text;el.className='np-track';
    row.style.display='flex';
    try{iappyx.audio.setMediaSession(JSON.stringify({title:s?s.name:'Radio',artist:text,album:'Live'}));}catch(e){}
  } else {
    el.textContent='';row.style.display='none';
  }
}
function clearSchedule(){
  document.getElementById('metaScheduleWrap').style.display='none';
  document.getElementById('schedNowTitle').textContent='—';document.getElementById('schedNextTitle').textContent='—';
  document.getElementById('schedNowTime').textContent='';document.getElementById('schedNextTime').textContent='';
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Metadata ─────────────────────────────────────────────────────────────────
window.onMeta=function(data){
  var d=typeof data==='string'?JSON.parse(data):data;
  if(!d||!appPlaying)return;
  var text='';
  if(d.artist&&d.title)text=d.artist+' — '+d.title;
  else if(d.title)text=d.title;
  else if(d.artist)text=d.artist;
  else if(d.station)text=d.station;
  if(text&&text!==currentNowPlaying)setNowPlaying(text);
};
function startMetaFetch(){
  try{iappyx.audio.onMetadata('window.onMeta');}catch(e){}
}

window.onMediaButton=function(e){
  if(!e||!STATIONS.length)return;var a=e.action||'';
  if(a==='play'){if(!appPlaying)startStream();}
  else if(a==='pause'||a==='stop'){if(appPlaying)stopStream();}
  else if(a==='next')selectStation((currentStationIdx+1)%STATIONS.length);
  else if(a==='previous')selectStation((currentStationIdx-1+STATIONS.length)%STATIONS.length);
};
window.onAudioFocus=function(e){
  if(!e)return;var t=e.type||'';
  if(t==='loss'&&appPlaying)stopStream();else if(t==='lossTransient'&&appPlaying)stopStream();
  else if(t==='duck'&&appPlaying){try{iappyx.audio.setVolume(Math.max(0.15,appVolume/100*0.3));}catch(e){}}
  else if(t==='gain'&&appPlaying){try{iappyx.audio.setVolume(appVolume/100);}catch(e){}}
};
window.onNotifAction=function(e){if(!e)return;if(e.actionId==='stop'&&appPlaying)stopStream();};

// ── Sheet helpers ─────────────────────────────────────────────────────────────
function handleSheetClick(e,overlayId,closeFn){if(e.target===document.getElementById(overlayId))closeFn();}
function openSettings(){document.getElementById('settingsOverlay').classList.add('visible');}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('visible');}
function openTimers(){document.getElementById('timersOverlay').classList.add('visible');}
function closeTimers(){document.getElementById('timersOverlay').classList.remove('visible');}
function updateTimersBadge(){
  var btn=document.getElementById('btnTimers'),active=sleepTimerEnd>Date.now()||wakeActive;
  if(btn){if(active)btn.classList.add('active');else btn.classList.remove('active');}
}

// ── Sleep timer ───────────────────────────────────────────────────────────────
function setSleepTimer(minutes){
  if(sleepTimerId){clearInterval(sleepTimerId);sleepTimerId=null;}
  sleepTimerEnd=Date.now()+minutes*60*1000;iappyx.save('radio_sleep_end',String(sleepTimerEnd));
  ['t15','t30','t60','tOff'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  document.getElementById('t'+minutes).classList.add('active');startSleepCountdown();updateTimersBadge();
}
function startSleepCountdown(){
  document.getElementById('timerCountdown').classList.add('visible');
  if(sleepTimerId)clearInterval(sleepTimerId);
  sleepTimerId=setInterval(function(){
    var rem=sleepTimerEnd-Date.now();
    if(rem<=0){cancelSleepTimer();if(appPlaying)stopStream();return;}
    if(rem<=31000&&appPlaying&&!fadeIntervalId)fadeAndStop();
    var m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
    document.getElementById('timerText').textContent=T('timerRemaining',{m:m,s:(s<10?'0':'')+s});
  },1000);
}
function cancelSleepTimer(){
  if(sleepTimerId){clearInterval(sleepTimerId);sleepTimerId=null;}
  if(fadeIntervalId){clearInterval(fadeIntervalId);fadeIntervalId=null;if(appPlaying)try{iappyx.audio.setVolume(appVolume/100);}catch(e){}}
  sleepTimerEnd=0;document.getElementById('timerCountdown').classList.remove('visible');
  ['t15','t30','t60','tOff'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  iappyx.remove('radio_sleep_end');if(appPlaying)setStatus(T('statusLive'),'live');updateTimersBadge();
}

// ── Wake timer ────────────────────────────────────────────────────────────────
function toggleWakeTimer(){
  if(wakeActive){cancelWakeTimer();}
  else{
    var val=document.getElementById('wakeInput').value;if(!val){setWakeStatus(T('wakePickTime'));return;}
    wakeTimeStr=val;wakeActive=true;iappyx.save('radio_wake',wakeTimeStr);
    document.getElementById('wakeBtn').textContent=T('cancel');document.getElementById('wakeBtn').classList.add('active');
    scheduleWakeAlarm();showWakeStatus();startWakeCheck();updateTimersBadge();
  }
}
function scheduleWakeAlarm(){
  var parts=wakeTimeStr.split(':'),now=new Date(),wake=new Date(now);
  wake.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);if(wake<=now)wake.setDate(wake.getDate()+1);
  try{iappyx.alarm.setRepeating('radio_wake',86400000,'window.onWakeAlarm');}catch(e){}
  try{iappyx.alarm.setWithId('radio_wake_once',wake.getTime(),'window.onWakeAlarm');}catch(e){}
  try{iappyx.notification.schedule('radio_wake_notif',T('wakeNotifTitle'),T('wakeNotifBody'),wake.getTime()-60000);}catch(e){}
}
function cancelWakeTimer(){
  wakeActive=false;wakeTimeStr='';if(wakeTimerId){clearInterval(wakeTimerId);wakeTimerId=null;}
  try{iappyx.alarm.cancelById('radio_wake');}catch(e){}try{iappyx.alarm.cancelById('radio_wake_once');}catch(e){}
  try{iappyx.notification.cancelScheduled('radio_wake_notif');}catch(e){}iappyx.remove('radio_wake');
  document.getElementById('wakeBtn').textContent=T('set');document.getElementById('wakeBtn').classList.remove('active');
  document.getElementById('wakeStatus').className='wake-status-msg';updateTimersBadge();
}
window.onWakeAlarm=function(){if(!wakeActive)return;if(!appPlaying)startStream();try{iappyx.vibration.click();}catch(e){}scheduleWakeAlarm();};
function startWakeCheck(){
  if(wakeTimerId)clearInterval(wakeTimerId);
  wakeTimerId=setInterval(function(){
    if(!wakeActive)return;
    var now=new Date(),pad=function(n){return n<10?'0'+n:''+n;};
    if((pad(now.getHours())+':'+pad(now.getMinutes()))===wakeTimeStr&&!appPlaying)window.onWakeAlarm();
    showWakeStatus();
  },15000);
}
function showWakeStatus(){
  if(!wakeTimeStr)return;
  var now=new Date(),parts=wakeTimeStr.split(':'),wake=new Date(now);
  wake.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);if(wake<=now)wake.setDate(wake.getDate()+1);
  var diff=wake-now,h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  var msg=h>0?T('wakeAlarmSet',{t:wakeTimeStr,h:h,m:m}):m>0?T('wakeAlarmSetM',{t:wakeTimeStr,m:m}):T('wakeAlarmSetNow',{t:wakeTimeStr});
  setWakeStatus(msg);
}
function setWakeStatus(msg){var el=document.getElementById('wakeStatus');el.textContent=msg;el.className='wake-status-msg visible';}

// ── Search ────────────────────────────────────────────────────────────────────
var previewingId=null;
function stopPreview(){
  if(previewingId===null)return;
  if(!appPlaying){try{iappyx.audio.stop();}catch(e){}}
  var btn=document.querySelector('.btn-preview.previewing,.btn-preview.loading');
  if(btn){btn.className='btn-preview';btn.textContent='▶';}previewingId=null;
}
function togglePreview(item,btn){
  if(previewingId===item.stationuuid){stopPreview();return;}
  stopPreview();previewingId=item.stationuuid;btn.className='btn-preview loading';btn.textContent='';
  resolveStreamUrl(item.url_resolved||item.url,function(url){
    if(previewingId!==item.stationuuid)return;
    try{if(appPlaying)try{iappyx.audio.pause();}catch(e){}iappyx.audio.stop();}catch(e){}
    tryPlay(url,function(){btn.className='btn-preview';btn.textContent='▶';previewingId=null;});
    setTimeout(function(){if(previewingId===item.stationuuid){btn.className='btn-preview previewing';btn.textContent='■';}},600);
  });
}
function openSearch(){
  document.getElementById('searchOverlay').classList.add('visible');
  setTimeout(function(){document.getElementById('searchInput').focus();},300);renderSearchResults([]);
}
function closeSearch(){
  stopPreview();
  if(appPlaying){var s=STATIONS[currentStationIdx];if(s)try{iappyx.audio.play(s.stream);iappyx.audio.setVolume(appVolume/100);}catch(e){}}
  document.getElementById('searchOverlay').classList.remove('visible');document.getElementById('searchInput').value='';
}
function doSearch(){
  var q=document.getElementById('searchInput').value.trim();if(!q){setSearchStatus(T('searchEnter'));return;}
  setSearchStatus(T('searchSearching'));
  var ctrl=null;try{if(AbortSignal&&AbortSignal.timeout)ctrl=AbortSignal.timeout(10000);}catch(e){}
  fetch('https://de1.api.radio-browser.info/json/stations/search?name='+encodeURIComponent(q)+'&limit=40&hidebroken=true&order=votes&reverse=true',ctrl?{signal:ctrl}:{})
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(data){if(!data||!data.length){setSearchStatus(T('searchNone'));return;}renderSearchResults(data);})
    .catch(function(){setSearchStatus(T('searchFailed'));});
}
function setSearchStatus(msg){document.getElementById('searchResults').innerHTML='<div class="search-status">'+escapeHtml(msg)+'</div>';}
function renderSearchResults(items){
  var el=document.getElementById('searchResults');
  if(!items.length){el.innerHTML='<div class="search-status">'+T('searchHint')+'</div>';return;}
  var eids=STATIONS.map(function(s){return s.id;});el.innerHTML='';
  items.forEach(function(item){
    if(!item.url_resolved&&!item.url)return;
    var flv=item.codec&&item.codec.toUpperCase()==='FLV';
    var div=document.createElement('div');div.className='result-item'+(flv?' flv-unsupported':'');
    if(item.favicon){
      var img=document.createElement('img');img.className='result-favicon';img.src=item.favicon;img.alt='';
      var fb=document.createElement('div');fb.className='result-favicon-fallback';fb.style.display='none';fb.textContent='📻';
      img.onerror=function(){img.style.display='none';fb.style.display='flex';};div.appendChild(img);div.appendChild(fb);
    } else {var fb=document.createElement('div');fb.className='result-favicon-fallback';fb.textContent='📻';div.appendChild(fb);}
    var info=document.createElement('div');info.className='result-info';
    var nr=document.createElement('div');nr.style.cssText='display:flex;align-items:center;gap:6px;';
    if(item.codec){var c=document.createElement('span');c.style.cssText='padding:1px 6px;border-radius:4px;font-size:10px;flex-shrink:0;'+(flv?'background:rgba(255,107,107,0.15);color:var(--error);':'background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4);');c.textContent=item.codec.toUpperCase();nr.appendChild(c);}
    var added=eids.indexOf(item.stationuuid)>=0;
    var nm=document.createElement('div');nm.className='result-name';nm.textContent=item.name;nr.appendChild(nm);
    var mp=[];if(item.country)mp.push(item.country);
    if(item.tags){var tgs=item.tags.split(',').slice(0,3).map(function(t){return t.trim();}).filter(Boolean);if(tgs.length)mp.push(tgs.join(', '));}
    if(item.votes)mp.push('♥ '+item.votes);
    var me=document.createElement('div');me.className='result-meta';me.textContent=mp.join(' · ');
    info.appendChild(nr);info.appendChild(me);div.appendChild(info);
    var acts=document.createElement('div');acts.className='result-actions';
    var pb=document.createElement('button');pb.className='btn-preview';pb.textContent='▶';
    if(flv){pb.disabled=true;pb.style.opacity='0.3';pb.style.cursor='default';}
    else{pb.onclick=function(e){e.stopPropagation();togglePreview(item,pb);};}
    acts.appendChild(pb);
    if(flv){var ub=document.createElement('span');ub.style.cssText='font-size:10px;color:var(--error);opacity:0.7;flex-shrink:0;white-space:nowrap;';ub.textContent=T('unsupported');acts.appendChild(ub);}
    else if(added){var bg=document.createElement('span');bg.className='result-added-badge';bg.textContent='✓';acts.appendChild(bg);}
    else{
      var ab=document.createElement('div');ab.className='result-add';ab.textContent='+';
      ab.onclick=function(e){
        e.stopPropagation();if(previewingId===item.stationuuid)stopPreview();
        addStation(item);ab.outerHTML='';
        var bg=document.createElement('span');bg.className='result-added-badge';bg.textContent='✓';acts.appendChild(bg);eids.push(item.stationuuid);
      };acts.appendChild(ab);
    }
    div.appendChild(acts);el.appendChild(div);
  });
}

window.addEventListener('beforeunload',function(){
  stopPreview();stopViz();
  [sleepTimerId,wakeTimerId,listenIntervalId,fadeIntervalId].forEach(function(t){if(t)clearInterval(t);});
  if(reconnectTimer)clearTimeout(reconnectTimer);try{iappyx.sensor.stop();}catch(e){}
});
</script>
</body></html>
